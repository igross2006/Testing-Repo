<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#322b4d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Mythlings</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; overscroll-behavior: none; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #241f3a;
    color: #f6efe3;
    display: flex; flex-direction: column;
    height: 100dvh;
    user-select: none; -webkit-user-select: none;
  }

  /* ---------- header ---------- */
  header {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    padding: 10px 12px 6px;
    padding-top: max(10px, env(safe-area-inset-top));
  }
  header .title { font-weight: 800; letter-spacing: .03em; font-size: 1.02rem; }
  header .spacer { flex: 1; }
  .chip {
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.09); color: #ffd9a0;
    border-radius: 999px; padding: 6px 10px; font-size: .88rem; font-weight: 700;
    font-family: inherit;
  }
  button.chip:active { transform: scale(.94); }

  /* ---------- stage / environments ---------- */
  #stage {
    position: relative; flex: 1; margin: 0 10px;
    border-radius: 22px; overflow: hidden;
    touch-action: none;
    box-shadow: 0 8px 30px rgba(0,0,0,.35) inset, 0 2px 10px rgba(0,0,0,.3);
  }
  #scenery { position: absolute; inset: 0; pointer-events: none; }
  #scenery svg { display: block; }
  #wx { position: absolute; inset: 0; pointer-events: none; z-index: 4; overflow: hidden; }
  #stage.env-phone  { background: linear-gradient(180deg,#20194a 0%,#3a2c66 48%,#241f3a 100%); }
  #stage.env-meadow { background: linear-gradient(180deg,#8fd0ff 0%,#c8ecff 40%,#e8f9ff 52%,#a8dd8e 52%,#8fce77 100%); }
  #stage.env-grove  { background: linear-gradient(180deg,#131033 0%,#282052 46%,#3a2c66 56%,#1f3a2d 56%,#14281d 100%); }
  #stage.env-cove   { background: linear-gradient(180deg,#6ecbe8 0%,#aee6f2 38%,#d8f4f6 50%,#7fd8e8 50%,#a9e6ef 62%,#f6e3b0 62%,#eed49a 100%); }
  #stage.env-cavern { background: linear-gradient(180deg,#1c1433 0%,#2e2050 44%,#3d2a63 56%,#241a3e 56%,#180f2c 100%); }
  #stage.env-hollow { background: linear-gradient(180deg,#2a3a2c 0%,#41573f 46%,#5a7350 56%,#3a4d33 56%,#2c3b27 100%); }
  #stage.env-ember  { background: linear-gradient(180deg,#3a2030 0%,#5c2e3a 42%,#8a4a44 56%,#4d3238 56%,#3a252c 100%); }
  #stage.night::after {
    content:''; position: absolute; inset: 0;
    background: rgba(20,16,50,.32); pointer-events: none; z-index: 4;
  }

  /* weather-modified skies (sunny environments go grey / dark / wintry) */
  #stage.env-meadow.wx-grey  { background: linear-gradient(180deg,#93a0b5 0%,#b9c2d1 40%,#cfd5de 52%,#93b285 52%,#7d9c70 100%); }
  #stage.env-meadow.wx-storm { background: linear-gradient(180deg,#525c70 0%,#75808f 40%,#8e97a6 52%,#6d8a63 52%,#597552 100%); }
  #stage.env-meadow.wx-snowy { background: linear-gradient(180deg,#aeb9cc 0%,#d5dce8 40%,#e8ecf3 52%,#e6edf4 52%,#d2ddE8 100%); }
  #stage.env-cove.wx-grey    { background: linear-gradient(180deg,#8fa4b0 0%,#b4c4cc 38%,#ccd7dc 50%,#7fa8b5 50%,#93b8c2 62%,#d8cba8 62%,#c9bc98 100%); }
  #stage.env-cove.wx-storm   { background: linear-gradient(180deg,#4f5e6e 0%,#71818f 38%,#87979f 50%,#4f7382 50%,#628693 62%,#a89c80 62%,#998d73 100%); }
  #stage.env-cove.wx-snowy   { background: linear-gradient(180deg,#b3bfd0 0%,#d8dfe9 38%,#e9edf3 50%,#a5c4cf 50%,#bcd6de 62%,#e9e4d5 62%,#ddd8c9 100%); }
  #stage.env-hollow.wx-grey  { background: linear-gradient(180deg,#3a4442 0%,#525f52 46%,#68765f 56%,#46543f 56%,#374233 100%); }
  #stage.env-hollow.wx-storm { background: linear-gradient(180deg,#2c3434 0%,#3f4a41 46%,#4f5a4a 56%,#374233 56%,#2b3328 100%); }
  #stage.env-hollow.wx-snowy { background: linear-gradient(180deg,#8fa0a4 0%,#b8c5c4 46%,#d5dcd8 56%,#dfe6e2 56%,#c8d2cc 100%); }
  .greyCloud { filter: brightness(.72) saturate(.5); }
  .darkCloud { filter: brightness(.5) saturate(.4); }
  .paleCloud { filter: brightness(.95) saturate(.3); opacity:.9; }

  .deco { position: absolute; }

  .sun { top: 6%; right: 8%; width: 64px; height: 64px; }
  .sun .core {
    position:absolute; inset: 6px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff6c9, #ffd965);
    box-shadow: 0 0 46px #ffe08aa8;
  }
  .sun .rays { position:absolute; inset:0; animation: spin 24s linear infinite; }
  .sun .rays span {
    position:absolute; left:50%; top:50%; width:4px; height:64px; margin:-32px 0 0 -2px;
    background: linear-gradient(180deg,#ffe08a00,#ffe08a88 30%,#ffe08a00 45%,#ffe08a00 55%,#ffe08a88 70%,#ffe08a00);
    border-radius:2px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .moon { top: 5%; right: 9%; width: 58px; height: 58px; border-radius: 50%;
          background: radial-gradient(circle at 62% 35%, #fdf6de, #cfc4e8);
          box-shadow: 0 0 46px #cfc4e899; }
  .moon i { position:absolute; border-radius:50%; background:#bdb0dd; opacity:.5; }

  .cloud { height: 24px; width: 78px; border-radius: 999px; background: #ffffffe0;
           animation: drift linear infinite; }
  .cloud::before, .cloud::after {
    content:''; position:absolute; border-radius:50%; background:inherit;
  }
  .cloud::before { top:-13px; left:14px; width:32px; height:32px; }
  .cloud::after  { top:-9px;  left:40px; width:24px; height:24px; }
  @keyframes drift { from { transform: translateX(-130px); } to { transform: translateX(110vw); } }

  .star { border-radius: 50%; background: #fff; animation: twinkle 3s ease-in-out infinite; }
  @keyframes twinkle { 0%,100% { opacity:.2; } 50% { opacity:.95; } }
  .meteor {
    top: 8%; left: 12%; width: 3px; height: 3px; border-radius: 50%; background:#fff;
    box-shadow: 0 0 8px 2px #ffffffaa; opacity: 0;
    animation: shoot 9s ease-in infinite;
  }
  .meteor::before {
    content:''; position:absolute; right:1px; top:1px; width:70px; height:1.5px;
    background: linear-gradient(90deg,#fff0,#fffc); transform: rotate(-24deg); transform-origin: right center;
  }
  @keyframes shoot {
    0%, 88% { opacity: 0; transform: translate(0,0); }
    89% { opacity: 1; }
    96% { opacity: 0; transform: translate(160px,72px); }
    100% { opacity: 0; }
  }
  .firefly { width: 5px; height: 5px; border-radius: 50%;
    background: #d9ff8a; box-shadow: 0 0 9px 2px #d9ff8a88;
    animation: fly ease-in-out infinite alternate; }
  @keyframes fly { from { transform: translate(0,0); opacity:.95; } to { transform: translate(30px,-38px); opacity:.25; } }
  .fog { left:-10%; width:120%; height:34px; border-radius:50%;
    background:#cfc4e8; opacity:.12; filter: blur(8px);
    animation: fogDrift 14s ease-in-out infinite alternate; }
  @keyframes fogDrift { from { transform: translateX(-16px); } to { transform: translateX(26px); } }

  .wave { left:-50%; width:200%; height:26px;
    background: radial-gradient(circle at 20px -6px, transparent 13px, var(--wc) 14px);
    background-size: 40px 26px; background-repeat: repeat-x;
    animation: lap ease-in-out infinite alternate; }
  @keyframes lap { from { transform: translateX(0); } to { transform: translateX(40px); } }

  .sway { animation: sway 4s ease-in-out infinite alternate; transform-origin: bottom center; }
  @keyframes sway { from { transform: rotate(-3deg); } to { transform: rotate(3.5deg); } }
  .bobber { animation: boatBob 4.5s ease-in-out infinite alternate; }
  @keyframes boatBob { from { transform: translateY(0) rotate(-2deg); } to { transform: translateY(6px) rotate(2deg); } }
  .butterfly { animation: flutterPath 16s ease-in-out infinite alternate; }
  @keyframes flutterPath {
    0%   { transform: translate(0,0); }
    25%  { transform: translate(9vw,-6vh); }
    50%  { transform: translate(4vw,-12vh); }
    75%  { transform: translate(14vw,-4vh); }
    100% { transform: translate(18vw,-10vh); }
  }
  .bwing { animation: bflap .5s ease-in-out infinite alternate; transform-box: fill-box; }
  .bwing.L { transform-origin: right center; }
  .bwing.R { transform-origin: left center; }
  @keyframes bflap { from { transform: scaleX(1); } to { transform: scaleX(.35); } }
  .crab { animation: scuttle 26s linear infinite; }
  @keyframes scuttle {
    0% { transform: translateX(-70px); } 46% { transform: translateX(46vw); }
    54% { transform: translateX(46vw) scaleX(-1); } 100% { transform: translateX(-70px) scaleX(-1); }
  }
  .shroomGlow { filter: drop-shadow(0 0 6px #9fe8c8); }
  .crystalGlow { filter: drop-shadow(0 0 8px #b48ae8); animation: crystalPulse 3s ease-in-out infinite alternate; }
  @keyframes crystalPulse { from { filter: drop-shadow(0 0 5px #b48ae8); } to { filter: drop-shadow(0 0 13px #cfa8ff); } }
  .spore { width: 5px; height: 5px; border-radius: 50%; background: #d8e8a8; opacity:.7;
    animation: sporeFloat linear infinite; }
  @keyframes sporeFloat { to { transform: translateY(-90px) translateX(24px); opacity: 0; } }
  .steam { width: 30px; height: 44px; border-radius: 50%; background: #fff; opacity: .13; filter: blur(7px);
    animation: steamUp ease-in infinite; }
  @keyframes steamUp { to { transform: translateY(-110px) scale(1.5); opacity: 0; } }
  .vig { position: absolute; inset: 0; pointer-events: none;
         box-shadow: inset 0 -46px 60px -34px rgba(0,0,0,.28), inset 0 34px 54px -34px rgba(255,255,255,.07); }

  /* ---------- weather layers ---------- */
  .drop { position:absolute; top:-24px; width:2px; height:15px; border-radius:2px;
    background: linear-gradient(#ffffff00,#bfe4ff); animation: fall linear infinite; }
  @keyframes fall { to { transform: translateY(620px); } }
  .flake { position:absolute; top:-14px; border-radius:50%; background:#fff; opacity:.92;
    animation: snowfall linear infinite; }
  @keyframes snowfall { to { transform: translateY(620px) translateX(34px); } }
  .wxDim { position:absolute; inset:0; background: rgba(70,80,110,.22); }
  .wxFlash { position:absolute; inset:0; background:#fff; opacity:0; animation: flash 7s linear infinite; }
  .wxFlash.f2 { animation-delay: 3.4s; animation-duration: 9s; }
  @keyframes flash { 0%,93%,97%,100% { opacity:0; } 94%,96% { opacity:.55; } 95% { opacity:.15; } }
  .heatShimmer { position:absolute; inset:0; background: radial-gradient(ellipse at 50% 15%, #ffb37a22, transparent 60%); }
  .bolt { position:absolute; top:0; z-index:4; pointer-events:none;
    filter: drop-shadow(0 0 10px #fff) drop-shadow(0 0 22px #ffe08a);
    animation: boltFlash .5s ease-out forwards; }
  @keyframes boltFlash {
    0% { opacity:0; } 8% { opacity:1; } 28% { opacity:.35; }
    42% { opacity:1; } 100% { opacity:0; }
  }
  .brolly { transform-box: fill-box; transform-origin: center bottom;
    animation: brollySway 3s ease-in-out infinite alternate; }
  @keyframes brollySway { from { transform: rotate(-2.5deg); } to { transform: rotate(2.5deg); } }

  /* ---------- campfire ---------- */
  .campfire { filter: drop-shadow(0 0 12px #ff9a4d88); }

  /* ---------- phone playground ---------- */
  .pStatus {
    position: absolute; top: 8px; left: 0; right: 0; z-index: 1;
    display: flex; justify-content: space-between; padding: 0 18px;
    font-size: .75rem; font-weight: 700; opacity: .92;
  }
  .iconGrid {
    position: absolute; top: 8.5%; left: 6%; right: 6%; z-index: 1;
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px 10px;
    pointer-events: auto;
  }
  .appIcon {
    aspect-ratio: 1; border: none; border-radius: 24%; font-family: inherit; color: #f6efe3;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
    font-size: clamp(20px, 7.5vw, 34px);
    background: linear-gradient(160deg, rgba(255,255,255,.24), rgba(255,255,255,.08));
    box-shadow: 0 4px 10px rgba(0,0,0,.3);
  }
  .appIcon .lbl { font-size: .56rem; font-weight: 600; opacity: .85; }
  .appIcon.trembling { animation: tremble .3s linear infinite; }
  @keyframes tremble { 25% { transform: rotate(-2.5deg); } 75% { transform: rotate(2.5deg); } }
  .appIcon.bitten {
    -webkit-mask: radial-gradient(circle 19px at 86% 12%, transparent 18px, #000 19px);
    mask: radial-gradient(circle 19px at 86% 12%, transparent 18px, #000 19px);
    transform: rotate(-5deg); opacity: .8; animation: none;
  }
  .dock {
    position: absolute; left: 4%; right: 4%; bottom: 2%; height: 16%;
    border-radius: 22px; background: rgba(255,255,255,.1);
  }
  .paw { position:absolute; font-size:.85rem; opacity:.5; pointer-events:none;
    animation: pawFade 3s linear forwards; }
  @keyframes pawFade { to { opacity: 0; } }
  #notif {
    position: absolute; top: -60px; left: 8%; right: 8%; z-index: 8;
    background: rgba(20,18,40,.92); border: 1px solid rgba(255,255,255,.14);
    border-radius: 14px; padding: 9px 14px; font-size: .8rem;
    transition: top .35s ease-out; pointer-events: none;
  }
  #notif.show { top: 10px; }

  /* ---------- pets (wandering) ---------- */
  #pets { position: absolute; inset: 0; z-index: 3; pointer-events: none; }
  .petCard {
    position: absolute; text-align: center;
    transform: translateX(-50%);
    transition: width .3s;
    pointer-events: auto;
  }
  .petCard.active { width: min(46vw, 205px); z-index: 5; }
  .petCard:not(.active) { width: min(27vw, 118px); opacity: .95; z-index: 3; }
  .flipWrap { display: block; transition: transform .25s; }
  .petCard svg.creature { width: 100%; height: auto; display: block; }
  .petCard .creature { animation: bob 3.2s ease-in-out infinite; }
  .petCard.walking .creature { animation: trot .45s ease-in-out infinite; }
  .petCard.asleep .creature { animation-duration: 5.5s; }
  .petCard.sp-wisp .creature { animation-name: hoverFloat; animation-duration: 3.6s; }
  @keyframes hoverFloat {
    0%,100% { transform: translateY(0) rotate(-1.5deg); }
    50%     { transform: translateY(-14px) rotate(1.5deg); }
  }
  .petName {
    display: inline-block; margin-top: 2px; font-size: .78rem; font-weight: 700;
    background: rgba(0,0,0,.28); border-radius: 999px; padding: 3px 10px;
  }
  @keyframes bob {
    0%,100% { transform: translateY(0) scale(1,1); }
    50%     { transform: translateY(-5px) scale(1.012,.988); }
  }
  @keyframes trot {
    0%,100% { transform: translateY(0) scale(1,1); }
    50%     { transform: translateY(-9px) scale(.99,1.02); }
  }

  .eye { transform-origin: center; transform-box: fill-box; animation: blink 4.4s infinite; }
  @keyframes blink { 0%,93%,100% { transform: scaleY(1); } 95%,97% { transform: scaleY(.06); } }
  .tailWag { transform-box: fill-box; transform-origin: left center; animation: wag 3.2s ease-in-out infinite; }
  @keyframes wag { 0%,100% { transform: rotate(0); } 50% { transform: rotate(7deg); } }
  .wingF { transform-box: fill-box; transform-origin: bottom center; animation: flapW 3.2s ease-in-out infinite; }
  @keyframes flapW { 0%,100% { transform: rotate(0); } 50% { transform: rotate(-8deg); } }
  .wingF.R { animation-name: flapWR; }
  @keyframes flapWR { 0%,100% { transform: rotate(0); } 50% { transform: rotate(8deg); } }
  .flick { transform-box: fill-box; transform-origin: center bottom; animation: flick 1.4s ease-in-out infinite alternate; }
  .flick.f2 { animation-delay: .4s; } .flick.f3 { animation-delay: .8s; }
  @keyframes flick { from { transform: scaleY(1) skewX(0); } to { transform: scaleY(1.18) skewX(-4deg); } }
  .tent { transform-box: fill-box; transform-origin: top center; animation: wiggle 3s ease-in-out infinite alternate; }
  @keyframes wiggle { from { transform: rotate(-4deg); } to { transform: rotate(5deg); } }
  .puffAnim { animation: puffUp 3.6s ease-out infinite; opacity: 0; transform-box: fill-box; }
  .puffAnim.p2 { animation-delay: 1.2s; } .puffAnim.p3 { animation-delay: 2.4s; }
  @keyframes puffUp {
    0% { opacity:0; transform: translate(0,0) scale(.4); }
    15% { opacity:.5; }
    70% { opacity:0; transform: translate(12px,-42px) scale(1.15); }
    100% { opacity:0; }
  }
  .ember { animation: emberUp 3s linear infinite; opacity: 0; transform-box: fill-box; }
  .ember.e2 { animation-delay: 1.5s; }
  @keyframes emberUp {
    0% { opacity: 0; transform: translate(0,0); }
    15% { opacity: .9; }
    100% { opacity: 0; transform: translate(-10px,-70px); }
  }
  .bub { animation: bubUp 4s linear infinite; opacity: 0; transform-box: fill-box; }
  .bub.b2 { animation-delay: 2s; }
  @keyframes bubUp {
    0% { opacity: 0; transform: translate(0,0) scale(.6); }
    15% { opacity: .8; }
    100% { opacity: 0; transform: translate(6px,-60px) scale(1.1); }
  }
  .hornGlow { animation: hornPulse 2.6s ease-in-out infinite alternate; transform-box: fill-box; }
  @keyframes hornPulse { from { opacity: .55; } to { opacity: 1; } }

  .eggCard { position: absolute; left: 50%; bottom: 6%; transform: translateX(-50%);
             width: min(30vw, 130px); text-align: center; z-index: 6; pointer-events: auto; }
  .eggCard svg { width: 100%; }
  .eggCard.wob svg { animation: wobble .4s; }
  @keyframes wobble { 25% { transform: rotate(-9deg); } 75% { transform: rotate(9deg); } }
  .petCard.lunge .creature { animation: lunge .6s ease-out; }
  @keyframes lunge {
    30% { transform: translateY(-48px) scale(1.05,.95) rotate(-4deg); }
    60% { transform: translateY(0) scale(.95,1.06); }
  }
  .petCard.squish .creature { animation: squishA .35s ease-out; }
  @keyframes squishA { 40% { transform: scale(1.09,.89) translateY(3px); } }

  /* ---------- hatch cinematic ---------- */
  #hatchFx { position:absolute; inset:0; z-index:10; display:none; align-items:center;
    justify-content:center; flex-direction:column; gap:10px; pointer-events:none; }
  #hatchFx.on { display:flex; }
  #hatchFx .flashW { position:absolute; inset:0; background:#fff; opacity:0; }
  #hatchFx.on .flashW { animation: hatchFlash 1s ease-out forwards; }
  @keyframes hatchFlash { 0% { opacity:.95; } 100% { opacity:0; } }
  #hatchFx .sil { width:min(50vw,220px); animation: silGrow 1.4s ease-out forwards; }
  @keyframes silGrow { from { transform: scale(.4); } to { transform: scale(1); } }
  #hatchFx .sil svg { width:100%; height:auto; }
  #hatchFx .sil.dark svg { filter: brightness(0) opacity(.85); }
  #hatchFx .banner { background:#fffdf6; color:#46395a; border-radius:999px; padding:8px 18px;
    font-weight:800; opacity:0; }
  #hatchFx.reveal .banner { animation: bannerIn .4s ease-out forwards; }
  @keyframes bannerIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; } }

  /* ---------- particles / pickups ---------- */
  #fx { position: absolute; inset: 0; z-index: 5; pointer-events: none; overflow: hidden; }
  .float { position: absolute; font-size: 1.25rem; animation: floatUp 1.2s ease-out forwards; }
  @keyframes floatUp { to { transform: translateY(-70px); opacity: 0; } }
  .breath { position:absolute; width:10px; height:10px; border-radius:50%; background:#fff;
    opacity:.55; filter: blur(2px); animation: breathOut 1.6s ease-out forwards; pointer-events:none; }
  @keyframes breathOut { to { transform: translate(14px,-22px) scale(2.1); opacity:0; } }
  .pickup {
    position: absolute; z-index: 6; border: none; background: none;
    font-size: 1.6rem; animation: hover 1.6s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 6px #ffe08a);
  }
  @keyframes hover { from { transform: translateY(0); } to { transform: translateY(-10px); } }

  /* ---------- action bar / stats ---------- */
  #actions {
    display: flex; gap: 10px; justify-content: center; align-items: center;
    padding: 12px 14px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
  .act {
    flex: 1; max-width: 130px; border: none; border-radius: 18px;
    padding: 12px 6px; font-size: .95rem; font-weight: 700; font-family: inherit;
    background: rgba(255,255,255,.13); color: #f6efe3;
  }
  .act:active { transform: scale(.95); background: rgba(255,255,255,.22); }

  #statPanel {
    display: flex; gap: 12px; justify-content: center;
    padding: 8px 18px 0; font-size: .8rem;
  }
  .stat { flex: 1; max-width: 120px; }
  .stat .bar { height: 7px; border-radius: 99px; background: rgba(255,255,255,.15); overflow: hidden; margin-top: 3px; }
  .stat .fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg,#ffb37a,#ffd965); transition: width .5s; }
  .stat.s-happy .fill  { background: linear-gradient(90deg,#f79ec0,#ffc7dd); }
  .stat.s-energy .fill { background: linear-gradient(90deg,#8ad0ff,#c9ecff); }

  /* ---------- modal / toast ---------- */
  #modal {
    position: fixed; inset: 0; z-index: 20; display: none;
    background: rgba(15,12,30,.6); backdrop-filter: blur(3px);
    align-items: flex-end; justify-content: center;
  }
  #modal.open { display: flex; }
  #modalBox {
    background: #322b4d; border-radius: 24px 24px 0 0;
    width: 100%; max-width: 480px; padding: 18px 18px 26px;
    padding-bottom: max(26px, env(safe-area-inset-bottom));
    max-height: 72dvh; overflow-y: auto;
  }
  #modalBox h2 { margin: 0 0 12px; font-size: 1.05rem; }
  .rowCard {
    display: flex; align-items: center; gap: 12px; width: 100%;

function ac() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(freq, dur, type, vol, delay) {
  if (!S.sound) return;
  const c = ac(); if (!c) return;
  const o = c.createOscillator(), g = c.createGain();
  o.type = type || 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(vol || .08, c.currentTime + (delay || 0));
  g.gain.exponentialRampToValueAtTime(.0001, c.currentTime + (delay || 0) + dur);
  o.connect(g); g.connect(c.destination);
  o.start(c.currentTime + (delay || 0)); o.stop(c.currentTime + (delay || 0) + dur + .05);
}

function tickPet(p, sec, aff) {
  if (p.asleep) {
    p.food = clamp(p.food - F_DECAY * sec * .5);
    p.energy = clamp(p.energy + E_REGEN * sec);
    if (p.energy >= 100) p.asleep = false;
  } else {
    p.food = clamp(p.food - F_DECAY * sec);
    p.energy = clamp(p.energy - E_DECAY * sec);

  const hMul = (p.food < 30 ? 2 : 1) * (aff ? .5 : 1);
  p.happy = clamp(p.happy - H_DECAY * hMul * sec);
}

{

/* ====================== weather ====================== */

let wxState = { cond: 'clear', cold: false, hot: false, label: 'Clear' };
let fireLit = false;

const WX_PRESETS = {
  auto:  { label: 'Auto (my location)', emoji: '📍' },
  clear: { label: 'Sunny',    emoji: '☀️', st: { cond:'clear', cold:false, hot:false } },
  cloudy:{ label: 'Cloudy',   emoji: '☁️', st: { cond:'cloudy', cold:false, hot:false } },
  rain:  { label: 'Rainy',    emoji: '🌧️', st: { cond:'rain', cold:false, hot:false } },
  storm: { label: 'Stormy',   emoji: '⛈️', st: { cond:'storm', cold:false, hot:false } },
  snow:  { label: 'Snowy',    emoji: '❄️', st: { cond:'snow', cold:true, hot:false } },
  heat:  { label: 'Heat wave',emoji: '🥵', st: { cond:'clear', cold:false, hot:true } },
  chill: { label: 'Cold snap',emoji: '🥶', st: { cond:'clear', cold:true, hot:false } }
};

function wxFromCode(code, temp) {
  let cond = 'clear';
  if (code >= 1 && code <= 3) cond = 'cloudy';
  else if (code >= 45 && code <= 48) cond = 'fog';
  else if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) cond = 'rain';
  else if ((code >= 71 && code <= 77) || code === 85 || code === 86) cond = 'snow';
  else if (code >= 95) cond = 'storm';
  return { cond, cold: (temp != null && temp < 8) || cond === 'snow', hot: temp != null && temp > 30 };
}

function applyWx(st, label) {
  const changed = st.cond !== wxState.cond || st.cold !== wxState.cold || st.hot !== wxState.hot;
  wxState = { cond: st.cond, cold: st.cold, hot: st.hot, label };
  if (changed) {
    fireLit = false;
    renderWx(); renderStage(); renderAll(true);
  }
  renderHUD();
}

function fetchAutoWx() {
  if (S.wxMode !== 'auto' || !navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(async pos => {
    try {
      const { latitude, longitude } = pos.coords;
      const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude.toFixed(3)}&longitude=${longitude.toFixed(3)}&current=temperature_2m,weather_code`);
      const j = await r.json();
      const code = j.current.weather_code, temp = j.current.temperature_2m;
      const st = wxFromCode(code, temp);
      applyWx(st, `${Math.round(temp)}°C real weather`);
    } catch (e) { /* offline or blocked — keep current */ }
  }, () => {}, { timeout: 8000, maximumAge: 600000 });
}

function renderWx() {
  const w = $('#wx');
  let html = '';
  if (wxState.cond === 'rain' || wxState.cond === 'storm') {
    for (let i = 0; i < 18; i++)
      html += `<div class="drop" style="left:${Math.random() * 98}%; animation-duration:${.7 + Math.random() * .5}s; animation-delay:${Math.random() * 1.2}s"></div>`;
    html += '<div class="wxDim"></div>';
  }
  if (wxState.cond === 'storm') html += '<div class="wxFlash"></div><div class="wxFlash f2"></div>';
  if (wxState.cond === 'snow')
    for (let i = 0; i < 16; i++)
      html += `<div class="flake" style="left:${Math.random() * 98}%; width:${4 + Math.random() * 4}px; height:${4 + Math.random() * 4}px; animation-duration:${3.2 + Math.random() * 2.4}s; animation-delay:${Math.random() * 3}s"></div>`;
  if (wxState.cond === 'cloudy') html += `<div class="wxDim" style="background:rgba(90,95,115,.16)"></div>
    <div class="deco cloud" style="top:9%; animation-duration:38s; opacity:.9"></div>
    <div class="deco cloud" style="top:19%; animation-duration:55s; animation-delay:-25s; transform:scale(.8)"></div>`;
  if (wxState.cond === 'fog') html += `<div class="deco fog" style="top:30%; opacity:.3"></div>
    <div class="deco fog" style="top:50%; opacity:.25; animation-delay:-6s"></div>`;
  if (wxState.hot) html += '<div class="heatShimmer"></div>';
  w.innerHTML = html;
}

/* ====================== rendering ====================== */

const stage = $('#stage'), petsEl = $('#pets'), fx = $('#fx');

function isNight() { const h = new Date().getHours(); return h >= 20 || h < 6; }

function renderStage() {
  const key = S.mode === 'phone' ? 'phone' : S.env;
  let wxClass = '';
  if (key !== 'phone') {
    if (wxState.cond === 'storm') wxClass = ' wx-grey wx-storm';
    else if (wxState.cond === 'snow') wxClass = ' wx-snowy';
    else if (['rain', 'cloudy', 'fog'].includes(wxState.cond)) wxClass = ' wx-grey';
  }
  stage.className = 'env-' + key + wxClass + (isNight() && key !== 'phone' ? ' night' : '');
  $('#scenery').innerHTML = scenery(key) + '<div class="vig"></div>';
}

function renderPets() {
  let html = '';
  S.pets.forEach((p, i) => {
    const badge = p.form ? FORM_BADGE[p.form] + ' ' : '';
    const aff = inAffinity(p) ? ' ♥' : '';
    html += `<div class="petCard sp-${p.sp} ${i === S.active ? 'active' : ''} ${p.asleep ? 'asleep' : ''}"
      data-i="${i}" style="left:${p.x}%; bottom:${3 + (i % 3) * 1.5}%">

  if (S.egg) html += `<div class="eggCard ${S.egg.rare ? 'rare' : ''}" id="eggCard">${eggSVG(S.egg.taps, S.egg.rare)}<span class="petName">${S.egg.rare ? '✨ rare egg' : '??? egg'}</span></div>`;

}

function renderHUD() {
  $('#giggles').textContent = Math.floor(S.giggles);
  $('#btnEgg').hidden = !(S.pets.length < MAX_PETS && !S.egg && S.pets.length > 0);
  $('#btnSound').textContent = S.sound ? '🔊' : '🔇';
  $('#btnWx').textContent = S.wxMode === 'auto' ? '🌦️' : WX_PRESETS[S.wxMode].emoji;
  const p = S.pets[S.active];
  $('#statPanel').hidden = !p;
  if (p) {
    const set = (cls, v) => {
      const el = $('#statPanel .' + cls);
      el.querySelector('.v').textContent = Math.round(v);
      el.querySelector('.fill').style.width = v + '%';
    };
    set('s-food', p.food); set('s-happy', p.happy); set('s-energy', p.energy);
    $('#btnSleep').textContent = p.asleep ? '☀️ Wake' : '🌙 Sleep';
  }
}

let lastSig = '';
function renderAll(force) {
  const sig = JSON.stringify([S.env, S.mode, S.egg && S.egg.taps, S.active, wxState.cold, wxState.cond,
    S.pets.map(p => [p.sp, p.asleep, creatureMoodSig(p), p.form, p.name, inAffinity(p)])]);
  if (force || sig !== lastSig) { renderPets(); lastSig = sig; }
  renderHUD();
}

function petHeadPos(i) {

/* ====================== keepsakes / evolution / daily ====================== */

function grantKeepsake(sp, live) {
  S.keepsakes[sp] = (S.keepsakes[sp] || 0) + 1;
  if (live) {
    const [em, nm] = KEEPSAKE[sp];
    toast(`${em} ${SPECIES[sp].name} left you a ${nm}!`);
    sDrop();
    const i = S.pets.findIndex(q => q.sp === sp);
    const pp = i >= 0 && petHeadPos(i);
    if (pp) particle(em, pp.x, pp.y);
  }
  save();
}

function checkEvolve(p) {
  if (p.form || (p.xp || 0) < 40) return;
  if (p.happy < 35) p.form = 'moody';
  else if (p.fed > p.petted * 1.5) p.form = 'chonky';
  else if (p.petted > p.fed * 1.5) p.form = 'zoomy';
  else p.form = 'sunny';
  const r = stage.getBoundingClientRect();
  burst(r.width / 2, r.height * .5);
  sFanfare(); buzz([40, 60, 40, 60, 40]);
  toast(`${FORM_BADGE[p.form]} ${petName(p)} evolved into their ${FORM_NAME[p.form]} form!`);
  renderAll(true); save();
}

function dailyCheck() {
  const today = new Date().toDateString();
  if (S.lastDay === today) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  S.streak = S.lastDay === yesterday ? S.streak + 1 : 1;
  S.lastDay = today;
  if (S.pets.length) {
    const bonus = 10 + 5 * Math.min(S.streak, 5);
    S.giggles += bonus;
    const h = new Date().getHours();
    const greet = h < 5 ? 'a very late night' : h < 12 ? 'morning' : h < 18 ? 'afternoon' : 'evening';
    setTimeout(() => {
      toast(`☀️ Good ${greet}! Day ${S.streak} streak: +${bonus} ✨`);
      const r = stage.getBoundingClientRect();
      burst(r.width / 2, r.height * .35);
    }, 1200);
  }
  save();
}

/* ====================== interactions ====================== */

petsEl.addEventListener('click', e => {
  const egg = e.target.closest('#eggCard');
  if (egg) return tapEgg(egg);
  const card = e.target.closest('.petCard');
  if (!card) return;
  const i = +card.dataset.i;
  if (i !== S.active) { S.active = i; renderAll(true); save(); return; }
  // tap the active pet's name pill to rename
  if (e.target.closest('.petName')) {
    const p = S.pets[i];
    const n = prompt(`Rename ${petName(p)}?`, petName(p));
    if (n && n.trim()) { p.name = n.trim().slice(0, 14); renderAll(true); save(); }
  }
});

let hatching = false;
function tapEgg(el) {
  if (hatching) return;
  S.egg.taps++;
  buzz(20); sPop();
  el.classList.remove('wob'); void el.offsetWidth; el.classList.add('wob');
  if (S.egg.taps >= EGG_TAPS) return hatch();
  renderAll(); save();
}

function hatch() {
  hatching = true;
  const wantRare = !!S.egg.rare;
  let pool = Object.keys(SPECIES).filter(k =>
    SPECIES[k].rare === wantRare && !S.pets.some(p => p.sp === k));
  if (!pool.length) pool = Object.keys(SPECIES).filter(k => !S.pets.some(p => p.sp === k));
  const sp = rnd(pool);
  const newPet = { sp, food: 85, happy: 85, energy: 85, asleep: false, born: Date.now(),
                   x: 50, tx: 30 + Math.random() * 40, dir: 1, fed: 0, petted: 0, xp: 0 };
  S.egg = null;
  S.pets.push(newPet);
  S.active = S.pets.length - 1;
  if (!S.album.includes(sp)) S.album.push(sp);
  renderAll(true); save();
  // cinematic overlay (pet already exists underneath)
  const fxEl = $('#hatchFx');
  fxEl.querySelector('.sil').innerHTML = creatureSVG(newPet);
  fxEl.querySelector('.sil').classList.add('dark');
  fxEl.querySelector('.banner').textContent = `${SPECIES[sp].name} the ${SPECIES[sp].flavor}!`;
  fxEl.classList.add('on'); fxEl.classList.remove('reveal');
  buzz([40, 80, 40]); sRumble();
  setTimeout(() => {
    fxEl.querySelector('.sil').classList.remove('dark');
    fxEl.classList.add('reveal');
    sFanfare();
    const r = stage.getBoundingClientRect();
    burst(r.width / 2, r.height * .45);
  }, 1300);
  setTimeout(() => { fxEl.classList.remove('on', 'reveal'); hatching = false; }, 2900);
}

let petting = false, lastX = 0, lastY = 0, strokeAcc = 0, petBurst = 0;
petsEl.addEventListener('pointerdown', e => {
  const card = e.target.closest('.petCard.active');
  if (!card) return;
  petting = true; lastX = e.clientX; lastY = e.clientY; strokeAcc = 0;
  card.classList.add('squish');
  setTimeout(() => card.classList.remove('squish'), 400);
});
addEventListener('pointerup', () => petting = false);
addEventListener('pointercancel', () => petting = false);
petsEl.addEventListener('pointermove', e => {
  if (!petting) return;
  const p = S.pets[S.active];
  if (!p || p.asleep) return;
  strokeAcc += Math.hypot(e.clientX - lastX, e.clientY - lastY);
  lastX = e.clientX; lastY = e.clientY;
  if (strokeAcc > 110) {
    strokeAcc = 0;
    p.happy = clamp(p.happy + 2);
    p.petted++; p.xp = (p.xp || 0) + 1;
    p.tx = p.x;
    const r = stage.getBoundingClientRect();
    particle('💗', e.clientX - r.left, e.clientY - r.top);
    buzz(12); sChirp();
    petBurst++;
    // jealousy: lots of petting with an audience
    if (petBurst >= 12 && S.pets.length > 1 && Math.random() < .3) {
      petBurst = 0;
      const other = S.pets.find((q, i) => i !== S.active && !q.asleep);
      if (other) {
        other.happy = clamp(other.happy - 2);
        speak(rnd(JEALOUS).replace('{a}', petName(p)).replace(/\{b\}/g, petName(other)));
      }
    }
    checkEvolve(p);
    renderHUD();
  }
});

$('#btnFeed').addEventListener('click', () => {
  const p = S.pets[S.active];
  if (!p) return toast('Hatch your egg first! 🥚');
  if (p.asleep) return speak(`${petName(p)} is asleep… shhh 🤫`);
  if (p.food > 95) { speak(`${petName(p)} is completely full!!`); return; }
  p.food = clamp(p.food + 30); p.happy = clamp(p.happy + 3);
  p.fed++; p.xp = (p.xp || 0) + 2;
  const r = stage.getBoundingClientRect();
  particle('🍪', r.width / 2, r.height * .55);
  buzz(15); sCrunch();
  checkEvolve(p);
  renderAll(); save();
});

$('#btnSleep').addEventListener('click', () => {
  const p = S.pets[S.active];
  if (!p) return toast('Hatch your egg first! 🥚');
  p.asleep = !p.asleep;
  speak(p.asleep ? `${petName(p)} curls up to sleep… 💤 (dream bubbles incoming!)`
                 : `${petName(p)} is awake!`);
  renderAll(); save();
});

$('#btnSound').addEventListener('click', () => {
  S.sound = !S.sound; renderHUD(); save();
  if (S.sound) sChirp();
});

/* ---------- phone playground toggle ---------- */
$('#btnPhone').addEventListener('click', () => {
  S.mode = S.mode === 'phone' ? 'home' : 'phone';
  toast(S.mode === 'phone' ? '📱 Phone playground! Hungry pets may snack on your apps…'
                           : '🏞️ Back home!');
  renderStage(); renderAll(true); save();
});

// tap a chomped app to fix it; tap Games for the sparkle frenzy
let frenzyUntil = 0, frenzyCooldown = 0;
$('#scenery').addEventListener('click', e => {
  const ic = e.target.closest('.appIcon');
  if (!ic) return;
  const i = +ic.dataset.app;
  if (ic.classList.contains('bitten')) {
    bitten.delete(i);
    ic.classList.remove('bitten');
    toast(`You fixed ${APPS[i][1]}! 🔧`);
    buzz(12); sPop();
    return;
  }
  if (i === GAMES_ICON) {
    const now = Date.now();
    if (now < frenzyCooldown) return toast('Games needs a minute to recharge… 🎮');
    frenzyUntil = now + 12000; frenzyCooldown = now + 70000;
    notify('🎮 Games: SPARKLE FRENZY! Catch them all!');
    sFanfare();
  }
});

/* ---------- modals (env / egg / album / weather) ---------- */

function openModal(html) { $('#modalBox').innerHTML = html; $('#modal').classList.add('open'); }
$('#modal').addEventListener('click', e => { if (e.target === $('#modal')) $('#modal').classList.remove('open'); });

$('#btnEnv').addEventListener('click', () => {
  openModal(`<h2>Choose a home 🏞️</h2>` + Object.entries(ENVS).map(([k, v]) => {
    const owned = S.unlocked.includes(k), sel = S.env === k && S.mode === 'home';
    const st = sel ? 'current home' : owned ? 'tap to move in' : `unlock for ${v.cost} ✨`;
    return `<button class="rowCard ${sel ? 'sel' : ''}" data-k="${k}">
      <span class="preview pv-${k}"></span>
      <span><div class="nm">${v.emoji} ${v.name}</div><div class="st">${st}</div></span></button>`;
  }).join(''));
});

$('#btnEgg').addEventListener('click', () => {
  const kp = totalKeepsakes();
  openModal(`<h2>Get an egg 🥚</h2>
    <button class="rowCard" data-egg="common">
      <span class="preview">🥚</span>
      <span><div class="nm">Mystery egg — ${EGG_COST} ✨</div>
      <div class="st">Hatches a common Mythling</div></span></button>
    <button class="rowCard" data-egg="rare">
      <span class="preview">✨</span>
      <span><div class="nm">Rare egg — ${RARE_EGG_COST} ✨ + ${RARE_KEEPSAKES} keepsakes</div>
      <div class="st">Hatches a RARE Mythling · you have ${kp} keepsake${kp === 1 ? '' : 's'}</div></span></button>`);
});

$('#btnAlbum').addEventListener('click', () => {
  const cards = Object.keys(SPECIES).map(sp => {
    const known = S.album.includes(sp);
    const fake = { sp, food: 80, happy: 80, energy: 80, asleep: false };
    const [em] = KEEPSAKE[sp];
    const cur = S.pets.find(p => p.sp === sp);
    const badge = cur && cur.form ? ' ' + FORM_BADGE[cur.form] : '';
    return `<div class="albCard ${known ? '' : 'unknown'}">
      ${creatureSVG(fake)}
      <div class="an">${known ? SPECIES[sp].name + badge : '???'}</div>
      <div class="ak">${known ? SPECIES[sp].flavor : (SPECIES[sp].rare ? '✨ rare' : 'common')}</div>
      <div class="ak">${em} ×${S.keepsakes[sp] || 0}</div></div>`;
  }).join('');
  openModal(`<h2>Creature album 📖 · streak day ${S.streak || 1}</h2><div class="albGrid">${cards}</div>`);
});

$('#btnWx').addEventListener('click', () => {
  openModal(`<h2>Weather 🌦️ · now: ${wxState.label}</h2>` + Object.entries(WX_PRESETS).map(([k, v]) =>
    `<button class="rowCard ${S.wxMode === k ? 'sel' : ''}" data-wx="${k}">
      <span class="preview">${v.emoji}</span>
      <span><div class="nm">${v.label}</div>
      <div class="st">${k === 'auto' ? 'Uses your location for live real-world weather' : 'Set the vibe manually'}</div></span></button>`
  ).join(''));
});

$('#modalBox').addEventListener('click', e => {
  const env = e.target.closest('[data-k]');
  if (env) {
    const k = env.dataset.k;
    if (!S.unlocked.includes(k)) {
      if (S.giggles < ENVS[k].cost) return toast(`Need ${ENVS[k].cost} ✨ for ${ENVS[k].name}!`);
      S.giggles -= ENVS[k].cost; S.unlocked.push(k);
      toast(`🏡 ${ENVS[k].name} unlocked!`); sFanfare();
    }
    S.env = k; S.mode = 'home';
    $('#modal').classList.remove('open');
    renderStage(); renderAll(true); save();
    return;
  }
  const egg = e.target.closest('[data-egg]');
  if (egg) {
    const rare = egg.dataset.egg === 'rare';
    if (rare) {
      if (S.giggles < RARE_EGG_COST) return toast(`Need ${RARE_EGG_COST} ✨!`);
      if (totalKeepsakes() < RARE_KEEPSAKES) return toast(`Need ${RARE_KEEPSAKES} keepsakes — pets shed them over time!`);
      S.giggles -= RARE_EGG_COST;
      let left = RARE_KEEPSAKES;
      Object.keys(S.keepsakes).sort((a, b) => S.keepsakes[b] - S.keepsakes[a]).forEach(k => {
        const take = Math.min(left, S.keepsakes[k]); S.keepsakes[k] -= take; left -= take;
      });
    } else {
      if (S.giggles < EGG_COST) return toast(`Need ${EGG_COST} ✨ — catch more giggles!`);
      S.giggles -= EGG_COST;
    }
    S.egg = { taps: 0, rare };
    $('#modal').classList.remove('open');
    toast(rare ? 'A RARE egg appeared!! Tap it! ✨' : 'A mysterious egg appeared! Tap it! 🥚');
    renderAll(); save();
    return;
  }
  const wx = e.target.closest('[data-wx]');
  if (wx) {
    S.wxMode = wx.dataset.wx;
    $('#modal').classList.remove('open');
    if (S.wxMode === 'auto') { fetchAutoWx(); toast('📍 Using your real weather!'); renderHUD(); }
    else applyWx(WX_PRESETS[S.wxMode].st, WX_PRESETS[S.wxMode].label);
    save();
  }
});

/* ---------- pickups ---------- */
function spawnPickup(emoji, reward, cap) {
  if (stage.querySelectorAll('.pickup').length >= (cap || 3)) return;
  const b = document.createElement('button');
  b.className = 'pickup'; b.textContent = emoji;
  b.style.left = (10 + Math.random() * 78) + '%';
  b.style.top = (14 + Math.random() * 40) + '%';
  b.addEventListener('click', () => {
    S.giggles += reward;
    const r = stage.getBoundingClientRect(), br = b.getBoundingClientRect();
    particle('+' + reward + '✨', br.left - r.left, br.top - r.top);
    b.remove(); buzz(15); sPop(); renderHUD(); save();
  }, { once: true });
  stage.appendChild(b);
  setTimeout(() => b.remove(), 8000);
}

/* ====================== wandering ====================== */

setInterval(() => {
  S.pets.forEach(p => {
    if (p.asleep) { p.tx = p.x; return; }
    if (p.biteTarget != null) return;
    if (Math.abs((p.tx ?? p.x) - p.x) < 1 && Math.random() < 0.18) {
      // storms make everyone huddle near the middle
      p.tx = wxState.cond === 'storm' ? 38 + Math.random() * 24 : 12 + Math.random() * 76;
    }
  });
}, 1000);

let pawTick = 0;
setInterval(() => {
  pawTick++;
  S.pets.forEach((p, i) => {
    const el = petsEl.querySelector(`.petCard[data-i="${i}"]`);
    if (!el) return;
    const d = (p.tx ?? p.x) - p.x;
    const speed = p.form === 'zoomy' ? 1.15 : 0.8;
    if (Math.abs(d) > 0.8 && !p.asleep) {
      p.x += Math.sign(d) * Math.min(Math.abs(d), speed);
      p.dir = Math.sign(d) || 1;
      el.classList.add('walking');
      el.querySelector('.flipWrap').style.transform = p.dir < 0 ? 'scaleX(-1)' : 'none';
      // footprints in the playground
      if (S.mode === 'phone' && pawTick % 12 === 0) {
        const r = stage.getBoundingClientRect(), br = el.getBoundingClientRect();
        const s = document.createElement('span');
        s.className = 'paw'; s.textContent = '🐾';
        s.style.left = (br.left - r.left + br.width / 2) + 'px';
        s.style.top = (br.bottom - r.top - 14) + 'px';
        stage.appendChild(s); setTimeout(() => s.remove(), 3100);
      }
    } else {
      el.classList.remove('walking');
    }
    el.style.left = p.x + '%';
  });
}, 120);

/* ====================== motion magic (best-effort) ====================== */

let motionReady = false;
function initMotion() {
  if (motionReady) return;
  motionReady = true;
  const attach = () => addEventListener('devicemotion', e => {
    const a = e.accelerationIncludingGravity;
    if (!a) return;
    const mag = Math.abs(a.x || 0) + Math.abs(a.y || 0) + Math.abs(a.z || 0);
    if (mag > 42) {
      const p = S.pets[S.active];
      if (p && p.asleep) {
        p.asleep = false;
        speak(`${petName(p)} woke up dizzy!! 😵‍💫 Gentle shakes only!`);
        renderAll(true); save();
      }
    }
  });
  try {
    if (typeof DeviceMotionEvent !== 'undefined' && DeviceMotionEvent.requestPermission)
      DeviceMotionEvent.requestPermission().then(r => { if (r === 'granted') attach(); }).catch(() => {});
    else attach();
  } catch (e) {}
}
addEventListener('pointerdown', () => { ac(); initMotion(); }, { once: true });

/* ====================== playground brain ====================== */

function chompIcon(p, pi, el) {
  const i = +el.dataset.app;
  bitten.set(i, Date.now() + 25000);
  el.classList.remove('trembling');
  el.classList.add('bitten');
  const card = petsEl.querySelector(`.petCard[data-i="${pi}"]`);
  if (card) { card.classList.add('lunge'); setTimeout(() => card.classList.remove('lunge'), 700); }
  const r = stage.getBoundingClientRect(), br = el.getBoundingClientRect();
  particle('🦷', br.left - r.left + br.width / 2, br.top - r.top + br.height / 2);
  particle('nom!', br.left - r.left + br.width, br.top - r.top);
  p.food = clamp(p.food + 8); p.happy = clamp(p.happy + 2);
  p.xp = (p.xp || 0) + 1;
  speak(rnd(BITES[p.sp]).replace('{app}', APPS[i][1]));
  notify(`${APPS[i][0]} ${APPS[i][1]}: please stop eating me.`);
  buzz([20, 40, 20]); sCrunch();
  p.biteTarget = null;
  checkEvolve(p);
  save();
}

function tickPlayground() {
  const now = Date.now();
  for (const [i, exp] of bitten) {
    if (exp < now) {
      bitten.delete(i);
      const el = stage.querySelector(`.appIcon[data-app="${i}"]`);
      if (el) el.classList.remove('bitten');
    }
  }
  if (now < frenzyUntil) spawnPickup('✨', 1, 8);
  S.pets.forEach((p, pi) => {
    if (p.asleep) { p.biteTarget = null; return; }
    if (p.biteTarget == null && p.food < 70 && Math.random() < 0.15) {
      const avail = APPS.map((_, i) => i).filter(i => !bitten.has(i));
      if (avail.length) p.biteTarget = rnd(avail);
    }
    if (p.biteTarget != null) {
      const el = stage.querySelector(`.appIcon[data-app="${p.biteTarget}"]`);
      if (!el || bitten.has(p.biteTarget)) { p.biteTarget = null; return; }
      const r = stage.getBoundingClientRect(), br = el.getBoundingClientRect();
      const ix = ((br.left + br.width / 2 - r.left) / r.width) * 100;
      p.tx = ix;
      el.classList.add('trembling');
      if (Math.abs(p.x - ix) < 7) chompIcon(p, pi, el);
    }
  });
}

/* ====================== game loop ====================== */

let dramaTimer = 0;
setInterval(() => {
  S.pets.forEach(p => tickPet(p, 1, inAffinity(p)));
  if (S.mode === 'phone') tickPlayground();

  if (S.pets.some(p => !p.asleep && p.happy > 65) && Math.random() < 0.09)
    spawnPickup('✨', 2);
  if (S.pets.some(p => p.asleep) && Math.random() < 0.05)
    spawnPickup('💭', 3);

  // keepsake drops (rare, from happy pets)
  S.pets.forEach(p => {
    if (!p.asleep && p.happy > 55 && Math.random() < 0.0022) grantKeepsake(p.sp, true);
  });

  // weather ambience
  if (wxState.cold) {
    S.pets.forEach((p, i) => {
      if (!p.asleep && Math.random() < 0.1) {
        const pp = petHeadPos(i);
        if (pp) breathPuff(pp.x + 14, pp.y);
      }
    });
    if (!fireLit && S.mode === 'home' && S.pets.some(p => p.sp === 'dragon')) {
      fireLit = true;
      speak(`${petName(S.pets.find(p => p.sp === 'dragon'))} lit a cozy campfire! 🔥 Everyone gather round.`);
    }
  }
  if (wxState.hot && Math.random() < 0.04) {
    const i = S.pets.findIndex(p => !p.asleep);
    if (i >= 0) { const pp = petHeadPos(i); if (pp) particle('💧', pp.x + 18, pp.y); }
  }
  if (wxState.cond === 'storm' && Math.random() < 0.09) spawnLightning();

  // cuddles when two happy pets wander near each other
  const happyPets = S.pets.filter(p => !p.asleep && p.happy > 60);
  for (let i = 0; i < happyPets.length; i++)
    for (let j = i + 1; j < happyPets.length; j++) {
      const a = happyPets[i], b = happyPets[j];
      if (Math.abs(a.x - b.x) < 16 && Math.random() < 0.06) {
        speak(rnd(CUDDLES).replace('{a}', petName(a)).replace(/\{b\}/g, petName(b)));
        const r = stage.getBoundingClientRect();
        particle('💞', r.width * (a.x + b.x) / 200, r.height * .55);
      }
    }

  // drama & idle chatter (weather-aware)
  if (++dramaTimer >= 18) {
    dramaTimer = 0;
    const p = S.pets[S.active];
    if (p && !p.asleep) {
      const L = SPECIES[p.sp].lines;
      if (p.food < 40) speak(rnd(L.hungry));
      else if (p.energy < 30) speak(rnd(L.tired));
      else if (p.happy < 40) speak(rnd(L.sad));
      else if (wxState.cold && Math.random() < .35 && L.cold) speak(rnd(L.cold));
      else if (wxState.hot && Math.random() < .35 && L.hot) speak(rnd(L.hot));
      else if (inAffinity(p) && Math.random() < .25) speak(`${petName(p)} LOVES it here. ♥`);
      else if (p.happy > 75 && Math.random() < .5) speak(rnd(L.idle));
    }
  }

  renderAll();
  if (dramaTimer % 10 === 0) save();
}, 1000);

/* ====================== boot ====================== */

renderStage(); renderWx(); renderAll(true);
setInterval(renderStage, 60000);
dailyCheck();

if (S.wxMode === 'auto') fetchAutoWx();
else applyWx(WX_PRESETS[S.wxMode].st, WX_PRESETS[S.wxMode].label);
setInterval(() => { if (S.wxMode === 'auto') fetchAutoWx(); }, 1800000);

if (!S.greeted) {
  S.greeted = true; save();
  setTimeout(() => toast('A mysterious egg appeared! Tap it! 🥚'), 600);
}

if ('serviceWorker' in navigator && location.protocol === 'https:')
  navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
