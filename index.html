<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#322b4d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Mythlings</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; overscroll-behavior: none; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #241f3a;
    color: #f6efe3;
    display: flex; flex-direction: column;
    height: 100dvh;
    user-select: none; -webkit-user-select: none;
  }

  /* ---------- header ---------- */
  header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px 6px;
    padding-top: max(10px, env(safe-area-inset-top));
  }
  header .title { font-weight: 800; letter-spacing: .03em; font-size: 1.05rem; }
  header .spacer { flex: 1; }
  .chip {
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.09); color: #ffd9a0;
    border-radius: 999px; padding: 6px 12px; font-size: .9rem; font-weight: 700;
    font-family: inherit;
  }
  button.chip:active { transform: scale(.94); }

  /* ---------- stage / environments ---------- */
  #stage {
    position: relative; flex: 1; margin: 0 10px;
    border-radius: 22px; overflow: hidden;
    touch-action: none;
    box-shadow: 0 8px 30px rgba(0,0,0,.35) inset, 0 2px 10px rgba(0,0,0,.3);
  }
  #scenery { position: absolute; inset: 0; pointer-events: none; }
  #scenery svg { display: block; }
  #stage.env-phone  { background: linear-gradient(180deg,#20194a 0%,#3a2c66 48%,#241f3a 100%); }
  #stage.env-meadow { background: linear-gradient(180deg,#8fd0ff 0%,#c8ecff 40%,#e8f9ff 52%,#a8dd8e 52%,#8fce77 100%); }
  #stage.env-grove  { background: linear-gradient(180deg,#131033 0%,#282052 46%,#3a2c66 56%,#1f3a2d 56%,#14281d 100%); }
  #stage.env-cove   { background: linear-gradient(180deg,#6ecbe8 0%,#aee6f2 38%,#d8f4f6 50%,#7fd8e8 50%,#a9e6ef 62%,#f6e3b0 62%,#eed49a 100%); }
  #stage.night::after {
    content:''; position: absolute; inset: 0;
    background: rgba(20,16,50,.32); pointer-events: none; z-index: 4;
  }

  .deco { position: absolute; }

  /* sun & moon */
  .sun { top: 6%; right: 8%; width: 64px; height: 64px; }
  .sun .core {
    position:absolute; inset: 6px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff6c9, #ffd965);
    box-shadow: 0 0 46px #ffe08aa8;
  }
  .sun .rays { position:absolute; inset:0; animation: spin 24s linear infinite; }
  .sun .rays span {
    position:absolute; left:50%; top:50%; width:4px; height:64px; margin:-32px 0 0 -2px;
    background: linear-gradient(180deg,#ffe08a00,#ffe08a88 30%,#ffe08a00 45%,#ffe08a00 55%,#ffe08a88 70%,#ffe08a00);
    border-radius:2px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .moon { top: 5%; right: 9%; width: 58px; height: 58px; border-radius: 50%;
          background: radial-gradient(circle at 62% 35%, #fdf6de, #cfc4e8);
          box-shadow: 0 0 46px #cfc4e899; }
  .moon i { position:absolute; border-radius:50%; background:#bdb0dd; opacity:.5; }

  /* clouds */
  .cloud { height: 24px; width: 78px; border-radius: 999px; background: #ffffffe0;
           animation: drift linear infinite; }
  .cloud::before, .cloud::after {
    content:''; position:absolute; border-radius:50%; background:inherit;
  }
  .cloud::before { top:-13px; left:14px; width:32px; height:32px; }
  .cloud::after  { top:-9px;  left:40px; width:24px; height:24px; }
  @keyframes drift { from { transform: translateX(-130px); } to { transform: translateX(110vw); } }

  /* stars / meteor / fireflies / fog */
  .star { border-radius: 50%; background: #fff; animation: twinkle 3s ease-in-out infinite; }
  @keyframes twinkle { 0%,100% { opacity:.2; } 50% { opacity:.95; } }
  .meteor {
    top: 8%; left: 12%; width: 3px; height: 3px; border-radius: 50%; background:#fff;
    box-shadow: 0 0 8px 2px #ffffffaa; opacity: 0;
    animation: shoot 9s ease-in infinite;
  }
  .meteor::before {
    content:''; position:absolute; right:1px; top:1px; width:70px; height:1.5px;
    background: linear-gradient(90deg,#fff0,#fffc); transform: rotate(-24deg); transform-origin: right center;
  }
  @keyframes shoot {
    0%, 88% { opacity: 0; transform: translate(0,0); }
    89% { opacity: 1; }
    96% { opacity: 0; transform: translate(160px,72px); }
    100% { opacity: 0; }
  }
  .firefly { width: 5px; height: 5px; border-radius: 50%;
    background: #d9ff8a; box-shadow: 0 0 9px 2px #d9ff8a88;
    animation: fly ease-in-out infinite alternate; }
  @keyframes fly { from { transform: translate(0,0); opacity:.95; } to { transform: translate(30px,-38px); opacity:.25; } }
  .fog { left:-10%; width:120%; height:34px; border-radius:50%;
    background:#cfc4e8; opacity:.12; filter: blur(8px);
    animation: fogDrift 14s ease-in-out infinite alternate; }
  @keyframes fogDrift { from { transform: translateX(-16px); } to { transform: translateX(26px); } }

  /* waves */
  .wave { left:-50%; width:200%; height:26px;
    background: radial-gradient(circle at 20px -6px, transparent 13px, var(--wc) 14px);
    background-size: 40px 26px; background-repeat: repeat-x;
    animation: lap ease-in-out infinite alternate; }
  @keyframes lap { from { transform: translateX(0); } to { transform: translateX(40px); } }

  /* generic sways & bobs for scenery svgs */
  .sway { animation: sway 4s ease-in-out infinite alternate; transform-origin: bottom center; }
  @keyframes sway { from { transform: rotate(-3deg); } to { transform: rotate(3.5deg); } }
  .bobber { animation: boatBob 4.5s ease-in-out infinite alternate; }
  @keyframes boatBob { from { transform: translateY(0) rotate(-2deg); } to { transform: translateY(6px) rotate(2deg); } }
  .butterfly { animation: flutterPath 16s ease-in-out infinite alternate; }
  @keyframes flutterPath {
    0%   { transform: translate(0,0); }
    25%  { transform: translate(9vw,-6vh); }
    50%  { transform: translate(4vw,-12vh); }
    75%  { transform: translate(14vw,-4vh); }
    100% { transform: translate(18vw,-10vh); }
  }
  .bwing { animation: bflap .5s ease-in-out infinite alternate; transform-box: fill-box; }
  .bwing.L { transform-origin: right center; }
  .bwing.R { transform-origin: left center; }
  @keyframes bflap { from { transform: scaleX(1); } to { transform: scaleX(.35); } }
  .crab { animation: scuttle 26s linear infinite; }
  @keyframes scuttle {
    0% { transform: translateX(-70px); } 46% { transform: translateX(46vw); }
    54% { transform: translateX(46vw) scaleX(-1); } 100% { transform: translateX(-70px) scaleX(-1); }
  }
  .shroomGlow { filter: drop-shadow(0 0 6px #9fe8c8); }
  .vig { position: absolute; inset: 0; pointer-events: none;
         box-shadow: inset 0 -46px 60px -34px rgba(0,0,0,.28), inset 0 34px 54px -34px rgba(255,255,255,.07); }

  /* ---------- phone playground ---------- */
  .pStatus {
    position: absolute; top: 8px; left: 0; right: 0; z-index: 1;
    display: flex; justify-content: space-between; padding: 0 18px;
    font-size: .75rem; font-weight: 700; opacity: .92;
  }
  .iconGrid {
    position: absolute; top: 8.5%; left: 6%; right: 6%; z-index: 1;
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px 10px;
    pointer-events: auto;
  }
  .appIcon {
    aspect-ratio: 1; border: none; border-radius: 24%; font-family: inherit; color: #f6efe3;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
    font-size: clamp(20px, 7.5vw, 34px);
    background: linear-gradient(160deg, rgba(255,255,255,.24), rgba(255,255,255,.08));
    box-shadow: 0 4px 10px rgba(0,0,0,.3);
  }
  .appIcon .lbl { font-size: .56rem; font-weight: 600; opacity: .85; }
  .appIcon.trembling { animation: tremble .3s linear infinite; }
  @keyframes tremble { 25% { transform: rotate(-2.5deg); } 75% { transform: rotate(2.5deg); } }
  .appIcon.bitten {
    -webkit-mask: radial-gradient(circle 19px at 86% 12%, transparent 18px, #000 19px);
    mask: radial-gradient(circle 19px at 86% 12%, transparent 18px, #000 19px);
    transform: rotate(-5deg); opacity: .8; animation: none;
  }
  .dock {
    position: absolute; left: 4%; right: 4%; bottom: 2%; height: 16%;
    border-radius: 22px; background: rgba(255,255,255,.1);
  }
  .petCard.lunge .creature { animation: lunge .6s ease-out; }
  @keyframes lunge {
    30% { transform: translateY(-48px) scale(1.05,.95) rotate(-4deg); }
    60% { transform: translateY(0) scale(.95,1.06); }
  }
  .petCard.squish .creature { animation: squishA .35s ease-out; }
  @keyframes squishA { 40% { transform: scale(1.09,.89) translateY(3px); } }

  /* ---------- speech bubble ---------- */
  #bubble {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    max-width: 84%; z-index: 6;
    background: #fffdf6; color: #46395a;
    border-radius: 16px; padding: 9px 14px;
    font-size: .86rem; line-height: 1.35; text-align: center;
    box-shadow: 0 4px 14px rgba(0,0,0,.25);
    opacity: 0; transition: opacity .4s; pointer-events: none;
  }
  #bubble.show { opacity: 1; }

  /* ---------- pets (wandering) ---------- */
  #pets { position: absolute; inset: 0; z-index: 3; pointer-events: none; }
  .petCard {
    position: absolute; text-align: center;
    transform: translateX(-50%);
    transition: width .3s;
    pointer-events: auto;
  }
  .eggCard { pointer-events: auto; }
  .petCard.active { width: min(46vw, 205px); z-index: 5; }
  .petCard:not(.active) { width: min(27vw, 118px); opacity: .95; z-index: 3; }
  .flipWrap { display: block; transition: transform .25s; }
  .petCard svg.creature { width: 100%; height: auto; display: block; }
  .petCard .creature { animation: bob 3.2s ease-in-out infinite; }
  .petCard.walking .creature { animation: trot .45s ease-in-out infinite; }
  .petCard.asleep .creature { animation-duration: 5.5s; }
  .petName {
    display: inline-block; margin-top: 2px; font-size: .78rem; font-weight: 700;
    background: rgba(0,0,0,.28); border-radius: 999px; padding: 3px 10px;
  }
  @keyframes bob {
    0%,100% { transform: translateY(0) scale(1,1); }
    50%     { transform: translateY(-5px) scale(1.012,.988); }
  }
  @keyframes trot {
    0%,100% { transform: translateY(0) scale(1,1); }
    50%     { transform: translateY(-9px) scale(.99,1.02); }
  }

  /* creature part animations */
  .eye { transform-origin: center; transform-box: fill-box; animation: blink 4.4s infinite; }
  @keyframes blink { 0%,93%,100% { transform: scaleY(1); } 95%,97% { transform: scaleY(.06); } }
  .tailWag { transform-box: fill-box; transform-origin: left center; animation: wag 3.2s ease-in-out infinite; }
  @keyframes wag { 0%,100% { transform: rotate(0); } 50% { transform: rotate(7deg); } }
  .wingF { transform-box: fill-box; transform-origin: bottom center; animation: flapW 3.2s ease-in-out infinite; }
  @keyframes flapW { 0%,100% { transform: rotate(0); } 50% { transform: rotate(-8deg); } }
  .wingF.R { animation-name: flapWR; }
  @keyframes flapWR { 0%,100% { transform: rotate(0); } 50% { transform: rotate(8deg); } }
  .flick { transform-box: fill-box; transform-origin: center bottom; animation: flick 1.4s ease-in-out infinite alternate; }
  .flick.f2 { animation-delay: .4s; } .flick.f3 { animation-delay: .8s; }
  @keyframes flick { from { transform: scaleY(1) skewX(0); } to { transform: scaleY(1.18) skewX(-4deg); } }
  .tent { transform-box: fill-box; transform-origin: top center; animation: wiggle 3s ease-in-out infinite alternate; }
  @keyframes wiggle { from { transform: rotate(-4deg); } to { transform: rotate(5deg); } }
  .puffAnim { animation: puffUp 3.6s ease-out infinite; opacity: 0; transform-box: fill-box; }
  .puffAnim.p2 { animation-delay: 1.2s; } .puffAnim.p3 { animation-delay: 2.4s; }
  @keyframes puffUp {
    0% { opacity:0; transform: translate(0,0) scale(.4); }
    15% { opacity:.5; }
    70% { opacity:0; transform: translate(12px,-42px) scale(1.15); }
    100% { opacity:0; }
  }
  .ember { animation: emberUp 3s linear infinite; opacity: 0; transform-box: fill-box; }
  .ember.e2 { animation-delay: 1.5s; }
  @keyframes emberUp {
    0% { opacity: 0; transform: translate(0,0); }
    15% { opacity: .9; }
    100% { opacity: 0; transform: translate(-10px,-70px); }
  }
  .bub { animation: bubUp 4s linear infinite; opacity: 0; transform-box: fill-box; }
  .bub.b2 { animation-delay: 2s; }
  @keyframes bubUp {
    0% { opacity: 0; transform: translate(0,0) scale(.6); }
    15% { opacity: .8; }
    100% { opacity: 0; transform: translate(6px,-60px) scale(1.1); }
  }

  .eggCard { position: absolute; left: 50%; bottom: 6%; transform: translateX(-50%);
             width: min(30vw, 130px); text-align: center; z-index: 6; }
  .eggCard svg { width: 100%; }
  .eggCard.wob svg { animation: wobble .4s; }
  @keyframes wobble { 25% { transform: rotate(-9deg); } 75% { transform: rotate(9deg); } }

  /* ---------- particles / pickups ---------- */
  #fx { position: absolute; inset: 0; z-index: 5; pointer-events: none; overflow: hidden; }
  .float { position: absolute; font-size: 1.25rem; animation: floatUp 1.2s ease-out forwards; }
  @keyframes floatUp { to { transform: translateY(-70px); opacity: 0; } }
  .pickup {
    position: absolute; z-index: 6; border: none; background: none;
    font-size: 1.6rem; animation: hover 1.6s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 6px #ffe08a);
  }
  @keyframes hover { from { transform: translateY(0); } to { transform: translateY(-10px); } }

  /* ---------- action bar / stats ---------- */
  #actions {
    display: flex; gap: 10px; justify-content: center; align-items: center;
    padding: 12px 14px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
  .act {
    flex: 1; max-width: 130px; border: none; border-radius: 18px;
    padding: 12px 6px; font-size: .95rem; font-weight: 700; font-family: inherit;
    background: rgba(255,255,255,.13); color: #f6efe3;
  }
  .act:active { transform: scale(.95); background: rgba(255,255,255,.22); }

  #statPanel {
    display: flex; gap: 12px; justify-content: center;
    padding: 8px 18px 0; font-size: .8rem;
  }
  .stat { flex: 1; max-width: 120px; }
  .stat .bar { height: 7px; border-radius: 99px; background: rgba(255,255,255,.15); overflow: hidden; margin-top: 3px; }
  .stat .fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg,#ffb37a,#ffd965); transition: width .5s; }
  .stat.s-happy .fill  { background: linear-gradient(90deg,#f79ec0,#ffc7dd); }
  .stat.s-energy .fill { background: linear-gradient(90deg,#8ad0ff,#c9ecff); }

  /* ---------- modal / toast ---------- */
  #modal {
    position: fixed; inset: 0; z-index: 20; display: none;
    background: rgba(15,12,30,.6); backdrop-filter: blur(3px);
    align-items: flex-end; justify-content: center;
  }
  #modal.open { display: flex; }
  #modalBox {
    background: #322b4d; border-radius: 24px 24px 0 0;
    width: 100%; max-width: 480px; padding: 18px 18px 26px;
    padding-bottom: max(26px, env(safe-area-inset-bottom));
  }
  #modalBox h2 { margin: 0 0 12px; font-size: 1.05rem; }
  .envCard {
    display: flex; align-items: center; gap: 12px; width: 100%;
    border: 2px solid transparent; border-radius: 16px; padding: 10px;
    background: rgba(255,255,255,.07); color: inherit; font-family: inherit;
    margin-bottom: 10px; text-align: left;
  }
  .envCard.sel { border-color: #ffd9a0; }
  .envCard .preview { width: 64px; height: 44px; border-radius: 10px; flex: none; }
  .envCard .nm { font-weight: 700; }
  .envCard .st { font-size: .78rem; opacity: .8; }
  .pv-meadow { background: linear-gradient(180deg,#9fd8ff 55%,#8fce77 55%); }
  .pv-grove  { background: linear-gradient(180deg,#221c44 56%,#1f3a2d 56%); }
  .pv-cove   { background: linear-gradient(180deg,#7fd8e8 54%,#eed49a 54%); }

  #toast {
    position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%);
    background: #fffdf6; color: #46395a; border-radius: 999px;
    padding: 9px 18px; font-size: .85rem; font-weight: 600; z-index: 30;
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
    opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <span class="title">🐉 Mythlings</span>
  <span class="spacer"></span>
  <button class="chip" id="btnEgg" hidden>🥚 50✨</button>
  <button class="chip" id="btnPhone">📱</button>
  <button class="chip" id="btnEnv">🏞️</button>
  <span class="chip">✨ <span id="giggles">0</span></span>
</header>

<div id="statPanel" hidden>
  <div class="stat s-food">🍖 <span class="v"></span><div class="bar"><div class="fill"></div></div></div>
  <div class="stat s-happy">💗 <span class="v"></span><div class="bar"><div class="fill"></div></div></div>
  <div class="stat s-energy">⚡ <span class="v"></span><div class="bar"><div class="fill"></div></div></div>
</div>

<div id="stage" class="env-meadow">
  <div id="scenery"></div>
  <div id="bubble"></div>
  <div id="pets"></div>
  <div id="fx"></div>
</div>

<div id="actions">
  <button class="act" id="btnFeed">🍪 Feed</button>
  <button class="act" id="btnSleep">🌙 Sleep</button>
</div>

<div id="modal">
  <div id="modalBox">
    <h2>Choose a home 🏞️</h2>
    <div id="envList"></div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';
const $ = s => document.querySelector(s);
const rnd = a => a[Math.floor(Math.random() * a.length)];
const clamp = v => Math.max(0, Math.min(100, v));
const buzz = ms => navigator.vibrate && navigator.vibrate(ms);

/* ============================== data ============================== */

const SPECIES = {
  dragon: {
    name: 'Sprout', flavor: 'baby dragon',
    lines: {
      hungry: ["Sprout has composed a ballad about his empty tummy. It has four verses.",
               "Sprout flops over dramatically. “No snacks… no strength…”"],
      tired:  ["Sprout's little wings are drooping… nap o'clock?"],
      sad:    ["Sprout hoarded three bottle caps to cheer himself up. It isn't working."],
      idle:   ["Sprout sneezed a tiny smoke ring! ✨",
               "Sprout is proudly guarding his hoard: one (1) shiny button."]
    }
  },
  phoenix: {
    name: 'Cinder', flavor: 'pocket phoenix',
    lines: {
      hungry: ["Cinder threatens to dramatically combust. She will not. She's just hungry.",
               "Cinder stares at the snack button. Pointedly."],
      tired:  ["Cinder's flame is down to birthday-candle size… bedtime?"],
      sad:    ["Cinder puffed into her egg out of embarrassment. Coax her back?"],
      idle:   ["Cinder is glowing extra warm today! 🔥",
               "Cinder rearranged her fluff. Please notice."]
    }
  },
  kraken: {
    name: 'Inky', flavor: 'bathtub kraken',
    lines: {
      hungry: ["Inky wrote “feed me” in ink. Politely. With a heart.",
               "Inky is gnawing on a tentacle. His own. For flavor reasons."],
      tired:  ["Inky's tentacles are doing the sleepy-noodle thing."],
      sad:    ["Inky says it's fine. Tentacles don't NEED hugs. (They do.)"],
      idle:   ["Inky gave you a four-arm hug!! 💜",
               "Inky found a fork for the collection."]
    }
  }
};

const CUDDLES = [
  "{a} and {b} made a cuddle pile! 💞",
  "{a} is using {b} as a pillow. {b} allows it.",
  "{a} and {b} are telling each other secrets!"
];

const ENVS = {
  meadow: { name: 'Cloud Meadow',   cost: 0,   emoji: '🌤️' },
  grove:  { name: 'Starfall Grove', cost: 100, emoji: '🌙' },
  cove:   { name: 'Tidepool Cove',  cost: 100, emoji: '🌊' }
};

const EGG_COST = 50, MAX_PETS = 3, EGG_TAPS = 6;

/* ============================ state ============================ */

function freshState() {
  return { giggles: 20, pets: [], active: 0, env: 'meadow', mode: 'home',
           unlocked: ['meadow'], egg: { taps: 0 }, last: Date.now(), greeted: false };
}
let S;
try { S = JSON.parse(localStorage.getItem('mythlings')); } catch (e) {}
if (!S || !Array.isArray(S.pets)) S = freshState();
if (!S.mode) S.mode = 'home';
S.pets.forEach((p, i) => {                  // migrate saves from before wandering
  if (p.x == null) { p.x = 25 + i * 25; p.tx = p.x; p.dir = 1; }
});

function save() { S.last = Date.now(); localStorage.setItem('mythlings', JSON.stringify(S)); }

/* ====================== simulation ====================== */

const F_DECAY = 100/21600, H_DECAY = 100/28800, E_DECAY = 100/36000, E_REGEN = 100/5400;

function tickPet(p, sec) {
  if (p.asleep) {
    p.food = clamp(p.food - F_DECAY * sec * .5);
    p.energy = clamp(p.energy + E_REGEN * sec);
    if (p.energy >= 100) p.asleep = false;
  } else {
    p.food = clamp(p.food - F_DECAY * sec);
    p.energy = clamp(p.energy - E_DECAY * sec);
  }
  const hMul = p.food < 30 ? 2 : 1;
  p.happy = clamp(p.happy - H_DECAY * hMul * sec);
}

{
  const away = Math.min(86400, (Date.now() - (S.last || Date.now())) / 1000);
  if (away > 60) S.pets.forEach(p => tickPet(p, away));
}

/* ====================== creature art ====================== */

function eyes(x1, x2, cy, closed, mood) {
  if (closed) return `
    <path d="M${x1-13} ${cy} q 13 11 26 0" fill="none" stroke="#3a2e3d" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M${x2-13} ${cy} q 13 11 26 0" fill="none" stroke="#3a2e3d" stroke-width="4.5" stroke-linecap="round"/>`;
  const spark = mood === 'happy' ? (x) => `<circle cx="${x+2}" cy="${cy-2}" r="1.8" fill="#fff" opacity=".9"/>` : () => '';
  const brow = mood === 'sad'
    ? (x, s) => `<path d="M${x - 14*s} ${cy-30} l ${28*s} 8" stroke="#3a2e3d" stroke-width="4" stroke-linecap="round"/>`
    : () => '';
  const one = (x, s) => `
    ${brow(x, s)}
    <g class="eye"><ellipse cx="${x}" cy="${cy}" rx="15" ry="20" fill="#3a2e3d"/>
    <circle cx="${x-5}" cy="${cy-8}" r="5.5" fill="#fff"/>
    <circle cx="${x+6}" cy="${cy+6}" r="2.4" fill="#fff" opacity=".85"/>${spark(x)}</g>`;
  return one(x1, 1) + one(x2, -1);
}
function blushes(x1, x2, cy) {
  return `<ellipse cx="${x1}" cy="${cy}" rx="13" ry="7.5" fill="#f79ec0" opacity=".55"/>
          <ellipse cx="${x2}" cy="${cy}" rx="13" ry="7.5" fill="#f79ec0" opacity=".55"/>`;
}
function mouth(mood, cx, cy) {
  if (mood === 'sad')  return `<path d="M${cx-15} ${cy+6} Q ${cx} ${cy-6} ${cx+15} ${cy+6}" fill="none" stroke="#3a2e3d" stroke-width="4.5" stroke-linecap="round"/>`;
  if (mood === 'ok')   return `<path d="M${cx-12} ${cy} L ${cx+12} ${cy}" stroke="#3a2e3d" stroke-width="4.5" stroke-linecap="round"/>`;
  return `<path d="M${cx-16} ${cy} Q ${cx} ${cy+11} ${cx+16} ${cy}" fill="none" stroke="#3a2e3d" stroke-width="4.5" stroke-linecap="round"/>`;
}

  dragon:  ["Sprout bit {app}! Verdict: crunchy, slightly pixelated.",
            "Sprout is hoarding {app} now. It's shiny and his."],
  phoenix: ["Cinder lightly toasted {app} before eating it. Gourmet.",
            "Cinder took ONE dramatic bite of {app} and swooned. She's fine."],

function scenery(env) {
  if (env === 'phone') {
    const d = new Date(), hr = d.getHours() % 12 || 12,
          mn = String(d.getMinutes()).padStart(2, '0'), ap = d.getHours() < 12 ? 'AM' : 'PM';
    const icons = APPS.map(([g, n], i) =>
      `<button class="appIcon ${bitten.has(i) ? 'bitten' : ''}" data-app="${i}">${g}<span class="lbl">${n}</span></button>`).join('');
    return `<div class="pStatus"><span>${hr}:${mn} ${ap}</span><span>📶 🔋 87%</span></div>
      <div class="iconGrid">${icons}</div><div class="dock"></div>`;
  }
  if (env === 'meadow') {
    let out = `
      <div class="deco sun"><div class="rays">${'<span style="transform:rotate(0deg)"></span><span style="transform:rotate(30deg)"></span><span style="transform:rotate(60deg)"></span><span style="transform:rotate(90deg)"></span><span style="transform:rotate(120deg)"></span><span style="transform:rotate(150deg)"></span>'}</div><div class="core"></div></div>

      <div class="deco cloud" style="top:22%; animation-duration:64s; animation-delay:-30s; transform:scale(.7); opacity:.85"></div>
      <div class="deco cloud" style="top:5%;  animation-duration:80s; animation-delay:-55s; transform:scale(.5); opacity:.7"></div>`;
    out += pos(fluffyTree(1, false), 'bottom:34%; left:2%;');
    out += pos(fluffyTree(.65, false), 'bottom:38%; right:4%; opacity:.9;');
    const fcols = ['#f79ec0', '#ffd965', '#b8a7f0', '#ff8a5c', '#f7c9d8'];
    [6, 18, 34, 58, 74, 88].forEach((x, i) =>
      { out += pos(`<span class="sway" style="display:inline-block; animation-delay:${i * .4}s">${flower(fcols[i % 5])}</span>`, `bottom:${5 + (i % 3) * 9}%; left:${x}%;`); });
    [12, 44, 66, 92].forEach((x, i) => { out += pos(grassTuft(), `bottom:${3 + (i % 2) * 13}%; left:${x}%; opacity:.9;`); });

  if (env === 'grove') {
    let out = `<div class="deco moon"><i style="top:12px;left:14px;width:11px;height:11px"></i><i style="top:30px;left:30px;width:7px;height:7px"></i><i style="top:16px;left:36px;width:5px;height:5px"></i></div>

    for (let i = 0; i < 16; i++)
      out += `<div class="deco star" style="top:${3 + Math.random() * 40}%; left:${Math.random() * 94}%;
              width:${2 + Math.random() * 2.5}px; height:${2 + Math.random() * 2.5}px; animation-delay:${Math.random() * 3}s"></div>`;
    out += pos(fluffyTree(1.15, true), 'bottom:30%; left:-2%;');
    out += pos(fluffyTree(.8, true), 'bottom:33%; left:14%; opacity:.8;');
    out += pos(fluffyTree(1, true), 'bottom:31%; right:-1%;');
    out += pos(fluffyTree(.6, true), 'bottom:35%; right:15%; opacity:.7;');
    [8, 26, 70, 90].forEach((x, i) =>
      { out += pos(`<span class="shroomGlow" style="display:inline-block">${glowShroom()}</span>`, `bottom:${4 + (i % 2) * 10}%; left:${x}%;`); });
    [[62,'18%',0],[72,'70%',2],[58,'44%',4],[80,'30%',1],[66,'85%',3]].forEach(([t, l, d]) =>
      { out += `<div class="deco firefly" style="top:${t}%; left:${l}; animation-duration:${6 + d}s; animation-delay:${d}s"></div>`; });
    out += `<div class="deco fog" style="bottom:24%"></div><div class="deco fog" style="bottom:10%; animation-delay:-7s; opacity:.09"></div>`;
    return out;
  }
  // cove
  let out = `
    <div class="deco sun" style="right:auto; left:8%"><div class="rays">${'<span style="transform:rotate(0deg)"></span><span style="transform:rotate(30deg)"></span><span style="transform:rotate(60deg)"></span><span style="transform:rotate(90deg)"></span><span style="transform:rotate(120deg)"></span><span style="transform:rotate(150deg)"></span>'}</div><div class="core"></div></div>
    <div class="deco cloud" style="top:8%; animation-duration:70s; animation-delay:-20s; opacity:.8"></div>
    <div class="deco wave" style="--wc:#8fdce8; top:47.5%; animation-duration:5s; opacity:.9"></div>
    <div class="deco wave" style="--wc:#b8ecf2; top:52%; animation-duration:6.5s; animation-delay:-2s; opacity:.8"></div>
    <div class="deco wave" style="--wc:#d8f4f6; top:57%; animation-duration:8s; animation-delay:-4s; opacity:.6"></div>`;
  out += pos(`<span class="bobber" style="display:inline-block">${sailboat()}</span>`, 'top:34%; left:64%;');
  out += pos(palmTree(), 'bottom:26%; left:-3%;');
  out += pos(palmTree(), 'bottom:28%; right:-5%; transform:scaleX(-1);');
  out += pos(shell(), 'bottom:8%; left:22%;');
  out += pos(shell(), 'bottom:4%; left:64%; transform:rotate(20deg);');
  out += pos(starfishSVG(), 'bottom:12%; right:12%;');
  out += pos(starfishSVG(), 'bottom:3%; left:38%; transform:rotate(40deg) scale(.8);');
  out += pos(`<span class="crab" style="display:inline-block">${crabSVG()}</span>`, 'bottom:1.5%; left:4%;');
  return out;
}

/* ====================== rendering ====================== */

const stage = $('#stage'), petsEl = $('#pets'), fx = $('#fx');

function isNight() { const h = new Date().getHours(); return h >= 20 || h < 6; }

function renderStage() {
  const key = S.mode === 'phone' ? 'phone' : S.env;
  stage.className = 'env-' + key + (isNight() && key !== 'phone' ? ' night' : '');
  $('#scenery').innerHTML = scenery(key) + '<div class="vig"></div>';
}

function renderPets() {
  let html = '';
  S.pets.forEach((p, i) => {
    html += `<div class="petCard ${i === S.active ? 'active' : ''} ${p.asleep ? 'asleep' : ''}"
      data-i="${i}" style="left:${p.x}%; bottom:${3 + (i % 3) * 1.5}%">
      <span class="flipWrap" style="transform:${p.dir < 0 ? 'scaleX(-1)' : 'none'}">${creatureSVG(p)}</span>
      <span class="petName">${SPECIES[p.sp].name}</span></div>`;
  });
  if (S.egg) html += `<div class="eggCard" id="eggCard">${eggSVG(S.egg.taps)}<span class="petName">??? egg</span></div>`;
  petsEl.innerHTML = html;
}

function renderHUD() {
  $('#giggles').textContent = Math.floor(S.giggles);
  $('#btnEgg').hidden = !(S.pets.length < MAX_PETS && !S.egg && S.pets.length > 0);
  const p = S.pets[S.active];
  $('#statPanel').hidden = !p;
  if (p) {
    const set = (cls, v) => {
      const el = $('#statPanel .' + cls);
      el.querySelector('.v').textContent = Math.round(v);
      el.querySelector('.fill').style.width = v + '%';
    };
    set('s-food', p.food); set('s-happy', p.happy); set('s-energy', p.energy);
    $('#btnSleep').textContent = p.asleep ? '☀️ Wake' : '🌙 Sleep';
  }
}

let lastSig = '';
function renderAll(force) {
  const sig = JSON.stringify([S.env, S.egg && S.egg.taps, S.active,
    S.pets.map(p => [p.sp, p.asleep, creatureMoodSig(p)])]);
  if (force || sig !== lastSig) { renderPets(); lastSig = sig; }
  renderHUD();
}

/* ====================== wandering ====================== */

setInterval(() => {                                    // pick new destinations
  S.pets.forEach(p => {
    if (p.asleep) { p.tx = p.x; return; }
    if (p.biteTarget != null) return;
    if (Math.abs((p.tx ?? p.x) - p.x) < 1 && Math.random() < 0.18)
      p.tx = 12 + Math.random() * 76;
  });
}, 1000);

setInterval(() => {                                    // move toward destinations
  S.pets.forEach((p, i) => {
    const el = petsEl.querySelector(`.petCard[data-i="${i}"]`);
    if (!el) return;
    const d = (p.tx ?? p.x) - p.x;
    if (Math.abs(d) > 0.8 && !p.asleep) {
      p.x += Math.sign(d) * Math.min(Math.abs(d), 0.8);
      p.dir = Math.sign(d) || 1;
      el.classList.add('walking');
      el.querySelector('.flipWrap').style.transform = p.dir < 0 ? 'scaleX(-1)' : 'none';
    } else {
      el.classList.remove('walking');
    }
    el.style.left = p.x + '%';
  });
}, 120);

/* ====================== feedback ====================== */

let toastT;
function toast(msg) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove('show'), 2600);
}
let bubbleT;
function speak(msg) {
  const b = $('#bubble'); b.textContent = msg; b.classList.add('show');
  clearTimeout(bubbleT); bubbleT = setTimeout(() => b.classList.remove('show'), 4200);
}
function particle(emoji, x, y) {
  const s = document.createElement('span');
  s.className = 'float'; s.textContent = emoji;
  s.style.left = x + 'px'; s.style.top = y + 'px';
  fx.appendChild(s); setTimeout(() => s.remove(), 1300);
}
function burst(cx, cy) {
  ['🎉','✨','🎊','💖','⭐','✨','🎉','💫'].forEach((e, i) =>
    setTimeout(() => particle(e, cx - 60 + Math.random() * 120, cy - 40 + Math.random() * 80), i * 70));
}

/* ====================== interactions ====================== */

petsEl.addEventListener('click', e => {
  const egg = e.target.closest('#eggCard');
  if (egg) return tapEgg(egg);
  const card = e.target.closest('.petCard');
  if (card && +card.dataset.i !== S.active) { S.active = +card.dataset.i; renderAll(true); save(); }
});

function tapEgg(el) {
  S.egg.taps++;
  buzz(20);
  el.classList.remove('wob'); void el.offsetWidth; el.classList.add('wob');
  if (S.egg.taps >= EGG_TAPS) {
    const owned = S.pets.map(p => p.sp);
    const sp = rnd(Object.keys(SPECIES).filter(k => !owned.includes(k)));
    S.pets.push({ sp, food: 85, happy: 85, energy: 85, asleep: false, born: Date.now(),
                  x: 50, tx: 30 + Math.random() * 40, dir: 1 });
    S.active = S.pets.length - 1;
    S.egg = null;
    const r = stage.getBoundingClientRect();
    burst(r.width / 2, r.height * .6);
    toast(`🎉 ${SPECIES[sp].name} the ${SPECIES[sp].flavor} hatched!`);
    buzz([40, 60, 40]);
  }
  renderAll(); save();
}

let petting = false, lastX = 0, lastY = 0, strokeAcc = 0;
petsEl.addEventListener('pointerdown', e => {
  const card = e.target.closest('.petCard.active');
  if (!card) return;
  petting = true; lastX = e.clientX; lastY = e.clientY; strokeAcc = 0;
  card.classList.add('squish');
  setTimeout(() => card.classList.remove('squish'), 400);
});
addEventListener('pointerup', () => petting = false);
addEventListener('pointercancel', () => petting = false);
petsEl.addEventListener('pointermove', e => {
  if (!petting) return;
  const p = S.pets[S.active];
  if (!p || p.asleep) return;
  strokeAcc += Math.hypot(e.clientX - lastX, e.clientY - lastY);
  lastX = e.clientX; lastY = e.clientY;
  if (strokeAcc > 110) {
    strokeAcc = 0;
    p.happy = clamp(p.happy + 2);
    p.tx = p.x;                                   // petting pauses wandering
    const r = stage.getBoundingClientRect();
    particle('💗', e.clientX - r.left, e.clientY - r.top);
    buzz(12);
    renderHUD();
  }
});

$('#btnFeed').addEventListener('click', () => {
  const p = S.pets[S.active];
  if (!p) return toast('Hatch your egg first! 🥚');
  if (p.asleep) return speak(`${SPECIES[p.sp].name} is asleep… shhh 🤫`);
  if (p.food > 95) { speak(`${SPECIES[p.sp].name} is completely full!!`); return; }
  p.food = clamp(p.food + 30); p.happy = clamp(p.happy + 3);
  const r = stage.getBoundingClientRect();
  particle('🍪', r.width / 2, r.height * .55);
  buzz(15); renderAll(); save();
});

$('#btnSleep').addEventListener('click', () => {
  const p = S.pets[S.active];
  if (!p) return toast('Hatch your egg first! 🥚');
  p.asleep = !p.asleep;
  speak(p.asleep ? `${SPECIES[p.sp].name} curls up to sleep… 💤 (dream bubbles incoming!)`
                 : `${SPECIES[p.sp].name} is awake!`);
  renderAll(); save();
});

$('#btnEgg').addEventListener('click', () => {
  if (S.giggles < EGG_COST) return toast(`Need ${EGG_COST} ✨ — catch more giggles!`);
  S.giggles -= EGG_COST; S.egg = { taps: 0 };
  toast('A mysterious egg appeared! Tap it! 🥚');
  renderAll(); save();
});

/* ---------- phone playground toggle ---------- */
$('#btnPhone').addEventListener('click', () => {
  S.mode = S.mode === 'phone' ? 'home' : 'phone';
  toast(S.mode === 'phone' ? '📱 Phone playground! Hungry pets may snack on your apps…'
                           : '🏞️ Back home!');
  renderStage(); renderAll(true); save();
});

// tap a chomped app to fix it
$('#scenery').addEventListener('click', e => {
  const ic = e.target.closest('.appIcon');
  if (!ic || !ic.classList.contains('bitten')) return;
  bitten.delete(+ic.dataset.app);
  ic.classList.remove('bitten');
  toast(`You fixed ${APPS[+ic.dataset.app][1]}! 🔧`);
  buzz(12);
});

/* ---------- environment modal ---------- */
$('#btnEnv').addEventListener('click', () => { renderEnvList(); $('#modal').classList.add('open'); });
$('#modal').addEventListener('click', e => { if (e.target === $('#modal')) $('#modal').classList.remove('open'); });

function renderEnvList() {
  $('#envList').innerHTML = Object.entries(ENVS).map(([k, v]) => {
    const owned = S.unlocked.includes(k), sel = S.env === k;
    const st = sel ? 'current home' : owned ? 'tap to move in' : `unlock for ${v.cost} ✨`;
    return `<button class="envCard ${sel ? 'sel' : ''}" data-k="${k}">
      <span class="preview pv-${k}"></span>
      <span><div class="nm">${v.emoji} ${v.name}</div><div class="st">${st}</div></span></button>`;
  }).join('');
}
$('#envList').addEventListener('click', e => {
  const card = e.target.closest('.envCard'); if (!card) return;
  const k = card.dataset.k;
  if (!S.unlocked.includes(k)) {
    if (S.giggles < ENVS[k].cost) return toast(`Need ${ENVS[k].cost} ✨ for ${ENVS[k].name}!`);
    S.giggles -= ENVS[k].cost; S.unlocked.push(k);
    toast(`🏡 ${ENVS[k].name} unlocked!`);
  }
  S.env = k; S.mode = 'home';
  $('#modal').classList.remove('open');
  renderStage(); renderAll(true); save();
});

/* ---------- pickups ---------- */
function spawnPickup(emoji, reward, msg) {
  if (stage.querySelectorAll('.pickup').length >= 3) return;
  const b = document.createElement('button');
  b.className = 'pickup'; b.textContent = emoji;
  b.style.left = (10 + Math.random() * 78) + '%';
  b.style.top = (14 + Math.random() * 40) + '%';
  b.addEventListener('click', () => {
    S.giggles += reward;
    const r = stage.getBoundingClientRect(), br = b.getBoundingClientRect();
    particle('+' + reward + '✨', br.left - r.left, br.top - r.top);
    b.remove(); buzz(15); renderHUD(); save();
    if (msg) speak(msg);
  }, { once: true });
  stage.appendChild(b);
  setTimeout(() => b.remove(), 8000);
}

/* ====================== game loop ====================== */

function chompIcon(p, pi, el) {
  const i = +el.dataset.app;
  bitten.set(i, Date.now() + 25000);
  el.classList.remove('trembling');
  el.classList.add('bitten');
  const card = petsEl.querySelector(`.petCard[data-i="${pi}"]`);
  if (card) { card.classList.add('lunge'); setTimeout(() => card.classList.remove('lunge'), 700); }
  const r = stage.getBoundingClientRect(), br = el.getBoundingClientRect();
  particle('🦷', br.left - r.left + br.width / 2, br.top - r.top + br.height / 2);
  particle('nom!', br.left - r.left + br.width, br.top - r.top);
  p.food = clamp(p.food + 8); p.happy = clamp(p.happy + 2);
  speak(rnd(BITES[p.sp]).replace('{app}', APPS[i][1]));
  buzz([20, 40, 20]);
  p.biteTarget = null;
  save();
}

function tickPlayground() {
  const now = Date.now();
  for (const [i, exp] of bitten) {
    if (exp < now) {
      bitten.delete(i);
      const el = stage.querySelector(`.appIcon[data-app="${i}"]`);
      if (el) el.classList.remove('bitten');
    }
  }
  S.pets.forEach((p, pi) => {
    if (p.asleep) { p.biteTarget = null; return; }
    if (p.biteTarget == null && p.food < 70 && Math.random() < 0.15) {
      const avail = APPS.map((_, i) => i).filter(i => !bitten.has(i));
      if (avail.length) p.biteTarget = rnd(avail);
    }
    if (p.biteTarget != null) {
      const el = stage.querySelector(`.appIcon[data-app="${p.biteTarget}"]`);
      if (!el || bitten.has(p.biteTarget)) { p.biteTarget = null; return; }
      const r = stage.getBoundingClientRect(), br = el.getBoundingClientRect();
      const ix = ((br.left + br.width / 2 - r.left) / r.width) * 100;
      p.tx = ix;
      el.classList.add('trembling');
      if (Math.abs(p.x - ix) < 7) chompIcon(p, pi, el);
    }
  });
}

let dramaTimer = 0;
setInterval(() => {
  S.pets.forEach(p => tickPet(p, 1));
  if (S.mode === 'phone') tickPlayground();

  if (S.pets.some(p => !p.asleep && p.happy > 65) && Math.random() < 0.09)
    spawnPickup('✨', 2);
  if (S.pets.some(p => p.asleep) && Math.random() < 0.05)
    spawnPickup('💭', 3);

  // cuddles when two happy pets wander near each other
  const happyPets = S.pets.filter(p => !p.asleep && p.happy > 60);
  for (let i = 0; i < happyPets.length; i++)
    for (let j = i + 1; j < happyPets.length; j++) {
      const a = happyPets[i], b = happyPets[j];
      if (Math.abs(a.x - b.x) < 16 && Math.random() < 0.06) {
        speak(rnd(CUDDLES).replace('{a}', SPECIES[a.sp].name).replace(/\{b\}/g, SPECIES[b.sp].name));
        const r = stage.getBoundingClientRect();
        particle('💞', r.width * (a.x + b.x) / 200, r.height * .55);
      }
    }

  if (++dramaTimer >= 18) {
    dramaTimer = 0;
    const p = S.pets[S.active];
    if (p && !p.asleep) {
      const L = SPECIES[p.sp].lines;
      if (p.food < 40) speak(rnd(L.hungry));
      else if (p.energy < 30) speak(rnd(L.tired));
      else if (p.happy < 40) speak(rnd(L.sad));
      else if (p.happy > 75 && Math.random() < .5) speak(rnd(L.idle));
    }
  }

  renderAll();
  if (dramaTimer % 10 === 0) save();
}, 1000);

/* ====================== boot ====================== */

renderStage(); renderAll(true);
setInterval(renderStage, 60000);

if (!S.greeted) {
  S.greeted = true; save();
  setTimeout(() => toast('A mysterious egg appeared! Tap it! 🥚'), 600);
}

if ('serviceWorker' in navigator && location.protocol === 'https:')
  navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
</html>
