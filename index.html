<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#322b4d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Mythlings</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; overscroll-behavior: none; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #241f3a;
    color: #f6efe3;
    display: flex; flex-direction: column;
    height: 100dvh;
    user-select: none; -webkit-user-select: none;
  }

  /* ---------- header ---------- */
  header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px calc(6px);
    padding-top: max(10px, env(safe-area-inset-top));
  }
  header .title { font-weight: 800; letter-spacing: .03em; font-size: 1.05rem; }
  header .spacer { flex: 1; }
  .chip {
    background: rgba(255,255,255,.12); border: none; color: #ffd9a0;
    border-radius: 999px; padding: 6px 12px; font-size: .9rem; font-weight: 700;
    font-family: inherit;
  }
  button.chip:active { transform: scale(.94); }

  /* ---------- stage / environments ---------- */
  #stage {
    position: relative; flex: 1; margin: 0 10px;
    border-radius: 22px; overflow: hidden;
    touch-action: none;
    box-shadow: 0 8px 30px rgba(0,0,0,.35) inset, 0 2px 10px rgba(0,0,0,.3);
  }
  #stage.env-meadow { background: linear-gradient(180deg,#9fd8ff 0%,#dff3ff 54%,#a8dd8e 54%,#8fce77 100%); }
  #stage.env-grove  { background: linear-gradient(180deg,#191538 0%,#2e2657 56%,#1f3a2d 56%,#173023 100%); }
  #stage.env-cove   { background: linear-gradient(180deg,#7fd8e8 0%,#c9f0f4 54%,#f6e3b0 54%,#eed49a 100%); }
  #stage.night::after {
    content:''; position: absolute; inset: 0;
    background: rgba(20,16,50,.32); pointer-events: none; z-index: 4;
  }

  .sun  { position: absolute; top: 7%; right: 10%; width: 52px; height: 52px; border-radius: 50%;
          background: radial-gradient(circle at 35% 35%, #fff6c9, #ffd965); box-shadow: 0 0 40px #ffe08a88; }
  .moon { position: absolute; top: 7%; right: 12%; width: 44px; height: 44px; border-radius: 50%;
          background: radial-gradient(circle at 62% 35%, #fdf6de, #cfc4e8); box-shadow: 0 0 30px #cfc4e877; }
  .cloud {
    position: absolute; height: 22px; width: 70px; border-radius: 999px; background: #ffffffdd;
    animation: drift 40s linear infinite;
  }
  .cloud::before {
    content:''; position: absolute; top: -12px; left: 16px; width: 30px; height: 30px;
    border-radius: 50%; background: inherit;
  }
  @keyframes drift { from { transform: translateX(-120px); } to { transform: translateX(calc(100vw)); } }
  .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle 3s ease-in-out infinite; }
  @keyframes twinkle { 0%,100% { opacity:.2; } 50% { opacity:.9; } }
  .firefly {
    position: absolute; width: 5px; height: 5px; border-radius: 50%;
    background: #d9ff8a; box-shadow: 0 0 8px #d9ff8a;
    animation: fly 7s ease-in-out infinite alternate;
  }
  @keyframes fly { from { transform: translate(0,0); opacity:.9; } to { transform: translate(26px,-34px); opacity:.3; } }
  .wave {
    position: absolute; left: -50%; width: 200%; height: 26px; top: 51.5%;
    background: radial-gradient(circle at 20px -6px, transparent 13px, #a9e6ef 14px);
    background-size: 40px 26px; background-repeat: repeat-x; opacity: .8;
    animation: lap 5s ease-in-out infinite alternate;
  }
  @keyframes lap { from { transform: translateX(0); } to { transform: translateX(40px); } }

  /* ---------- speech bubble ---------- */
  #bubble {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    max-width: 84%; z-index: 6;
    background: #fffdf6; color: #46395a;
    border-radius: 16px; padding: 9px 14px;
    font-size: .86rem; line-height: 1.35; text-align: center;
    box-shadow: 0 4px 14px rgba(0,0,0,.25);
    opacity: 0; transition: opacity .4s; pointer-events: none;
  }
  #bubble.show { opacity: 1; }

  /* ---------- pets ---------- */
  #pets {
    position: absolute; bottom: 4%; left: 0; right: 0; z-index: 3;
    display: flex; align-items: flex-end; justify-content: center; gap: 2vw;
  }
  .petCard { text-align: center; transition: width .3s; }
  .petCard .creature { animation: bob 3.2s ease-in-out infinite; }
  .petCard.active   { width: min(52vw, 230px); }
  .petCard:not(.active) { width: min(27vw, 118px); opacity: .92; }
  .petCard.asleep .creature { animation-duration: 5s; }
  .petCard svg { width: 100%; height: auto; display: block; }
  .petName {
    display: inline-block; margin-top: 2px; font-size: .78rem; font-weight: 700;
    background: rgba(0,0,0,.28); border-radius: 999px; padding: 3px 10px;
  }
  @keyframes bob {
    0%,100% { transform: translateY(0) scale(1,1); }
    50%     { transform: translateY(-5px) scale(1.012,.988); }
  }
  .eye { transform-origin: center; transform-box: fill-box; animation: blink 4.4s infinite; }
  @keyframes blink { 0%,93%,100% { transform: scaleY(1); } 95%,97% { transform: scaleY(.06); } }

  .eggCard { width: min(30vw, 130px); text-align: center; }
  .eggCard svg { width: 100%; }
  .eggCard.wob svg { animation: wobble .4s; }
  @keyframes wobble { 25% { transform: rotate(-9deg); } 75% { transform: rotate(9deg); } }

  /* ---------- particles / sparkles ---------- */
  #fx { position: absolute; inset: 0; z-index: 5; pointer-events: none; overflow: hidden; }
  .float { position: absolute; font-size: 1.25rem; animation: floatUp 1.2s ease-out forwards; }
  @keyframes floatUp { to { transform: translateY(-70px); opacity: 0; } }
  .pickup {
    position: absolute; z-index: 6; border: none; background: none;
    font-size: 1.6rem; animation: hover 1.6s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 6px #ffe08a);
  }
  @keyframes hover { from { transform: translateY(0); } to { transform: translateY(-10px); } }

  /* ---------- action bar ---------- */
  #actions {
    display: flex; gap: 10px; justify-content: center; align-items: center;
    padding: 12px 14px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
  .act {
    flex: 1; max-width: 130px; border: none; border-radius: 18px;
    padding: 12px 6px; font-size: .95rem; font-weight: 700; font-family: inherit;
    background: rgba(255,255,255,.13); color: #f6efe3;
  }
  .act:active { transform: scale(.95); background: rgba(255,255,255,.22); }

  /* ---------- stat bars ---------- */
  #statPanel {
    display: flex; gap: 12px; justify-content: center;
    padding: 8px 18px 0; font-size: .8rem;
  }
  .stat { flex: 1; max-width: 120px; }
  .stat .bar { height: 7px; border-radius: 99px; background: rgba(255,255,255,.15); overflow: hidden; margin-top: 3px; }
  .stat .fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg,#ffb37a,#ffd965); transition: width .5s; }
  .stat.s-happy .fill  { background: linear-gradient(90deg,#f79ec0,#ffc7dd); }
  .stat.s-energy .fill { background: linear-gradient(90deg,#8ad0ff,#c9ecff); }

  /* ---------- modal ---------- */
  #modal {
    position: fixed; inset: 0; z-index: 20; display: none;
    background: rgba(15,12,30,.6); backdrop-filter: blur(3px);
    align-items: flex-end; justify-content: center;
  }
  #modal.open { display: flex; }
  #modalBox {
    background: #322b4d; border-radius: 24px 24px 0 0;
    width: 100%; max-width: 480px; padding: 18px 18px 26px;
    padding-bottom: max(26px, env(safe-area-inset-bottom));
  }
  #modalBox h2 { margin: 0 0 12px; font-size: 1.05rem; }
  .envCard {
    display: flex; align-items: center; gap: 12px; width: 100%;
    border: 2px solid transparent; border-radius: 16px; padding: 10px;
    background: rgba(255,255,255,.07); color: inherit; font-family: inherit;
    margin-bottom: 10px; text-align: left;
  }
  .envCard.sel { border-color: #ffd9a0; }
  .envCard .preview { width: 64px; height: 44px; border-radius: 10px; flex: none; }
  .envCard .nm { font-weight: 700; }
  .envCard .st { font-size: .78rem; opacity: .8; }
  .pv-meadow { background: linear-gradient(180deg,#9fd8ff 55%,#8fce77 55%); }
  .pv-grove  { background: linear-gradient(180deg,#221c44 56%,#1f3a2d 56%); }
  .pv-cove   { background: linear-gradient(180deg,#7fd8e8 54%,#eed49a 54%); }

  /* ---------- toast ---------- */
  #toast {
    position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%);
    background: #fffdf6; color: #46395a; border-radius: 999px;
    padding: 9px 18px; font-size: .85rem; font-weight: 600; z-index: 30;
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
    opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <span class="title">🐉 Mythlings</span>
  <span class="spacer"></span>
  <button class="chip" id="btnEgg" hidden>🥚 50✨</button>
  <button class="chip" id="btnEnv">🏞️</button>
  <span class="chip">✨ <span id="giggles">0</span></span>
</header>

<div id="statPanel" hidden>
  <div class="stat s-food">🍖 <span class="v"></span><div class="bar"><div class="fill"></div></div></div>
  <div class="stat s-happy">💗 <span class="v"></span><div class="bar"><div class="fill"></div></div></div>
  <div class="stat s-energy">⚡ <span class="v"></span><div class="bar"><div class="fill"></div></div></div>
</div>

<div id="stage" class="env-meadow">
  <div id="scenery"></div>
  <div id="bubble"></div>
  <div id="pets"></div>
  <div id="fx"></div>
</div>

<div id="actions">
  <button class="act" id="btnFeed">🍪 Feed</button>
  <button class="act" id="btnSleep">🌙 Sleep</button>
</div>

<div id="modal">
  <div id="modalBox">
    <h2>Choose a home 🏞️</h2>
    <div id="envList"></div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';
const $ = s => document.querySelector(s);
const rnd = a => a[Math.floor(Math.random() * a.length)];
const clamp = v => Math.max(0, Math.min(100, v));
const buzz = ms => navigator.vibrate && navigator.vibrate(ms);

/* ============================== data ============================== */

const SPECIES = {
  dragon: {
    name: 'Sprout', flavor: 'baby dragon',
    lines: {
      hungry: ["Sprout has composed a ballad about his empty tummy. It has four verses.",
               "Sprout flops over dramatically. “No snacks… no strength…”"],
      tired:  ["Sprout's little wings are drooping… nap o'clock?"],
      sad:    ["Sprout hoarded three bottle caps to cheer himself up. It isn't working."],
      idle:   ["Sprout sneezed a tiny smoke ring! ✨",
               "Sprout is proudly guarding his hoard: one (1) shiny button."]
    }
  },
  phoenix: {
    name: 'Cinder', flavor: 'pocket phoenix',
    lines: {
      hungry: ["Cinder threatens to dramatically combust. She will not. She's just hungry.",
               "Cinder stares at the snack button. Pointedly."],
      tired:  ["Cinder's flame is down to birthday-candle size… bedtime?"],
      sad:    ["Cinder puffed into her egg out of embarrassment. Coax her back?"],
      idle:   ["Cinder is glowing extra warm today! 🔥",
               "Cinder rearranged her fluff. Please notice."]
    }
  },
  kraken: {
    name: 'Inky', flavor: 'bathtub kraken',
    lines: {
      hungry: ["Inky wrote “feed me” in ink. Politely. With a heart.",
               "Inky is gnawing on a tentacle. His own. For flavor reasons."],
      tired:  ["Inky's tentacles are doing the sleepy-noodle thing."],
      sad:    ["Inky says it's fine. Tentacles don't NEED hugs. (They do.)"],
      idle:   ["Inky gave you a four-arm hug!! 💜",
               "Inky found a fork for the collection."]
    }
  }
};

const CUDDLES = [
  "{a} and {b} made a cuddle pile! 💞",
  "{a} is using {b} as a pillow. {b} allows it.",
  "{a} and {b} are telling each other secrets!"
];

const ENVS = {
  meadow: { name: 'Cloud Meadow',   cost: 0,   emoji: '🌤️' },
  grove:  { name: 'Starfall Grove', cost: 100, emoji: '🌙' },
  cove:   { name: 'Tidepool Cove',  cost: 100, emoji: '🌊' }
};

const EGG_COST = 50, MAX_PETS = 3, EGG_TAPS = 6;

/* ============================ state ============================ */

function freshState() {
  return { giggles: 20, pets: [], active: 0, env: 'meadow',
           unlocked: ['meadow'], egg: { taps: 0 }, last: Date.now(), greeted: false };
}
let S;
try { S = JSON.parse(localStorage.getItem('mythlings')); } catch (e) {}
if (!S || !Array.isArray(S.pets)) S = freshState();

function save() { S.last = Date.now(); localStorage.setItem('mythlings', JSON.stringify(S)); }

/* ====================== simulation ====================== */

const F_DECAY = 100/21600, H_DECAY = 100/28800, E_DECAY = 100/36000, E_REGEN = 100/5400;

function tickPet(p, sec) {
  if (p.asleep) {
    p.food = clamp(p.food - F_DECAY * sec * .5);
    p.energy = clamp(p.energy + E_REGEN * sec);
    if (p.energy >= 100) p.asleep = false;
  } else {
    p.food = clamp(p.food - F_DECAY * sec);
    p.energy = clamp(p.energy - E_DECAY * sec);
  }
  const hMul = p.food < 30 ? 2 : 1;
  p.happy = clamp(p.happy - H_DECAY * hMul * sec);
}

// offline catch-up (capped at 24h)
{
  const away = Math.min(86400, (Date.now() - (S.last || Date.now())) / 1000);
  if (away > 60) S.pets.forEach(p => tickPet(p, away));
}

/* ====================== creature art ====================== */

function eyes(x1, x2, cy, closed) {
  if (closed) return `
    <path d="M${x1-13} ${cy} q 13 11 26 0" fill="none" stroke="#3a2e3d" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M${x2-13} ${cy} q 13 11 26 0" fill="none" stroke="#3a2e3d" stroke-width="4.5" stroke-linecap="round"/>`;
  const one = x => `
    <g class="eye"><ellipse cx="${x}" cy="${cy}" rx="15" ry="20" fill="#3a2e3d"/>
    <circle cx="${x-5}" cy="${cy-8}" r="5.5" fill="#fff"/>
    <circle cx="${x+6}" cy="${cy+6}" r="2.4" fill="#fff" opacity=".85"/></g>`;
  return one(x1) + one(x2);
}
function blushes(x1, x2, cy) {
  return `<ellipse cx="${x1}" cy="${cy}" rx="13" ry="7.5" fill="#f79ec0" opacity=".55"/>
          <ellipse cx="${x2}" cy="${cy}" rx="13" ry="7.5" fill="#f79ec0" opacity=".55"/>`;
}
function mouth(mood, cx, cy) {
  if (mood === 'sad')  return `<path d="M${cx-15} ${cy+6} Q ${cx} ${cy-6} ${cx+15} ${cy+6}" fill="none" stroke="#3a2e3d" stroke-width="4.5" stroke-linecap="round"/>`;
  if (mood === 'ok')   return `<path d="M${cx-12} ${cy} L ${cx+12} ${cy}" stroke="#3a2e3d" stroke-width="4.5" stroke-linecap="round"/>`;
  return `<path d="M${cx-16} ${cy} Q ${cx} ${cy+11} ${cx+16} ${cy}" fill="none" stroke="#3a2e3d" stroke-width="4.5" stroke-linecap="round"/>`;
}
const zzz = (x, y) => `<text x="${x}" y="${y}" font-size="26" fill="#cfc4e8" font-weight="bold">z&#8202;z</text>`;

const GRADS = `
  <radialGradient id="gDrag" cx="42%" cy="32%" r="80%">
    <stop offset="0%" stop-color="#a8e6c0"/><stop offset="60%" stop-color="#7fd4a4"/><stop offset="100%" stop-color="#5cbf8b"/>
  </radialGradient>
  <radialGradient id="gBelly" cx="50%" cy="30%" r="80%">
    <stop offset="0%" stop-color="#fdf6de"/><stop offset="100%" stop-color="#f3e2b8"/>
  </radialGradient>
  <radialGradient id="gWing" cx="50%" cy="20%" r="90%">
    <stop offset="0%" stop-color="#ffd9e8"/><stop offset="100%" stop-color="#f7b5d2"/>
  </radialGradient>
  <radialGradient id="gPhx" cx="42%" cy="30%" r="80%">
    <stop offset="0%" stop-color="#ffcf9c"/><stop offset="60%" stop-color="#ffb37a"/><stop offset="100%" stop-color="#f2925c"/>
  </radialGradient>
  <linearGradient id="gFlame" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%" stop-color="#ff8a5c"/><stop offset="100%" stop-color="#ffd965"/>
  </linearGradient>
  <radialGradient id="gKrk" cx="42%" cy="30%" r="80%">
    <stop offset="0%" stop-color="#cfc0f5"/><stop offset="60%" stop-color="#b8a7f0"/><stop offset="100%" stop-color="#8f7ad6"/>
  </radialGradient>
  <radialGradient id="gEgg" cx="40%" cy="30%" r="85%">
    <stop offset="0%" stop-color="#fffdf6"/><stop offset="100%" stop-color="#ead9f2"/>
  </radialGradient>`;

function dragonArt(mood, asleep) {
  return `
  <ellipse cx="200" cy="392" rx="100" ry="15" fill="#000" opacity=".18"/>
  <path d="M258 322 Q 322 316 330 274 Q 334 252 318 246" fill="none" stroke="#5cbf8b" stroke-width="26" stroke-linecap="round"/>
  <path d="M318 246 c -6 -12 -24 -8 -22 6 c 1 9 12 16 20 20 c 8 -6 17 -15 16 -24 c -2 -13 -19 -13 -14 -2 z" fill="#f7b5d2"/>
  <path d="M118 300 Q 74 268 82 226 Q 108 238 118 254 Q 118 240 132 232 Q 140 258 136 282 Z"
        fill="url(#gWing)" stroke="#e393b8" stroke-width="4" stroke-linejoin="round"/>
  <path d="M282 300 Q 326 268 318 226 Q 292 238 282 254 Q 282 240 268 232 Q 260 258 264 282 Z"
        fill="url(#gWing)" stroke="#e393b8" stroke-width="4" stroke-linejoin="round"/>
  <ellipse cx="200" cy="300" rx="80" ry="70" fill="url(#gDrag)"/>
  <ellipse cx="200" cy="315" rx="52" ry="46" fill="url(#gBelly)"/>
  <ellipse cx="152" cy="362" rx="24" ry="15" fill="#5cbf8b"/>
  <ellipse cx="248" cy="362" rx="24" ry="15" fill="#5cbf8b"/>
  <circle cx="200" cy="170" r="92" fill="url(#gDrag)"/>
  <path d="M146 96 Q 138 66 158 62 Q 172 78 166 100 Z" fill="#fdf6de" stroke="#e8d9a8" stroke-width="3"/>
  <path d="M254 96 Q 262 66 242 62 Q 228 78 234 100 Z" fill="#fdf6de" stroke="#e8d9a8" stroke-width="3"/>
  ${eyes(164, 236, 162, asleep)}
  ${blushes(134, 266, 196)}
  <ellipse cx="193" cy="205" rx="3.4" ry="4.6" fill="#3a2e3d" opacity=".8"/>
  <ellipse cx="207" cy="205" rx="3.4" ry="4.6" fill="#3a2e3d" opacity=".8"/>
  ${mouth(asleep ? 'ok' : mood, 200, 224)}
  ${asleep ? zzz(288, 96) : ''}`;
}

function phoenixArt(mood, asleep) {
  const flame = (x, h, w) =>
    `<path d="M${x} ${118} q ${-w} ${-h*.55} 0 ${-h} q ${w} ${h*.45} 0 ${h} z" fill="url(#gFlame)"/>`;
  return `
  <ellipse cx="200" cy="392" rx="95" ry="15" fill="#000" opacity=".18"/>
  ${flame(200, 62, 20)}${flame(168, 44, 15)}${flame(232, 44, 15)}
  <circle cx="200" cy="250" r="125" fill="url(#gPhx)"/>
  <path d="M92 260 Q 62 288 78 316 Q 104 306 112 284 Z" fill="#ffd965" stroke="#f2a25c" stroke-width="4" stroke-linejoin="round"/>
  <path d="M308 260 Q 338 288 322 316 Q 296 306 288 284 Z" fill="#ffd965" stroke="#f2a25c" stroke-width="4" stroke-linejoin="round"/>
  <ellipse cx="200" cy="308" rx="66" ry="52" fill="url(#gBelly)"/>
  <ellipse cx="166" cy="376" rx="16" ry="9" fill="#e8874f"/>
  <ellipse cx="234" cy="376" rx="16" ry="9" fill="#e8874f"/>
  ${eyes(158, 242, 218, asleep)}
  ${blushes(126, 274, 252)}
  <path d="M200 240 l -13 12 q 13 10 26 0 z" fill="#ffb545" stroke="#e8874f" stroke-width="3" stroke-linejoin="round"/>
  ${asleep ? zzz(292, 140) : (mood === 'sad'
      ? `<path d="M184 276 Q 200 266 216 276" fill="none" stroke="#3a2e3d" stroke-width="4.5" stroke-linecap="round"/>` : '')}`;
}

function krakenArt(mood, asleep) {
  const tent = (x, dx) =>
    `<path d="M${x} 300 q ${dx} 44 ${dx * .3} 62" fill="none" stroke="#8f7ad6" stroke-width="26" stroke-linecap="round"/>`;
  return `
  <ellipse cx="200" cy="392" rx="105" ry="15" fill="#000" opacity=".18"/>
  ${tent(118, -14)}${tent(152, -6)}${tent(186, -2)}${tent(214, 2)}${tent(248, 6)}${tent(282, 14)}
  <circle cx="200" cy="205" r="118" fill="url(#gKrk)"/>
  <ellipse cx="200" cy="282" rx="82" ry="40" fill="url(#gKrk)"/>
  <ellipse cx="200" cy="150" rx="34" ry="18" fill="#ffffff" opacity=".25"/>
  ${eyes(156, 244, 208, asleep)}
  ${blushes(122, 278, 242)}
  ${mouth(asleep ? 'ok' : mood, 200, 252)}
  ${asleep ? zzz(292, 118) : ''}
  <circle cx="286" cy="132" r="7" fill="#cfe8ff" opacity=".8"/>
  <circle cx="300" cy="112" r="4.5" fill="#cfe8ff" opacity=".6"/>`;
}

const ART = { dragon: dragonArt, phoenix: phoenixArt, kraken: krakenArt };

function creatureSVG(p) {
  const mood = p.asleep ? 'ok' : (Math.min(p.food, p.happy, p.energy) < 35 ? 'sad' : (p.happy > 70 ? 'happy' : 'ok'));
  return `<svg class="creature" viewBox="0 0 400 410"><defs>${GRADS}</defs>${ART[p.sp](mood, p.asleep)}</svg>`;
}

const eggSVG = `
  <svg viewBox="0 0 200 230"><defs>${GRADS}</defs>
  <ellipse cx="100" cy="205" rx="62" ry="11" fill="#000" opacity=".18"/>
  <ellipse cx="100" cy="120" rx="68" ry="88" fill="url(#gEgg)" stroke="#d6bde4" stroke-width="4"/>
  <circle cx="78" cy="90" r="7" fill="#d6bde4"/><circle cx="122" cy="132" r="9" fill="#cfc4e8"/>
  <circle cx="94" cy="160" r="5" fill="#d6bde4"/><circle cx="126" cy="76" r="5" fill="#cfc4e8"/>
  </svg>`;

/* ====================== rendering ====================== */

const stage = $('#stage'), petsEl = $('#pets'), fx = $('#fx');

function scenery(env) {
  if (env === 'meadow') return `<div class="sun"></div>
    <div class="cloud" style="top:12%; animation-delay:0s"></div>
    <div class="cloud" style="top:24%; animation-delay:-18s; transform:scale(.7)"></div>`;
  if (env === 'grove') {
    let stars = '';
    for (let i = 0; i < 10; i++)
      stars += `<div class="star" style="top:${4 + Math.random() * 40}%; left:${Math.random() * 94}%;
                width:${2 + Math.random() * 2}px; height:${2 + Math.random() * 2}px;
                animation-delay:${Math.random() * 3}s"></div>`;
    return `<div class="moon"></div>${stars}
      <div class="firefly" style="top:62%; left:18%"></div>
      <div class="firefly" style="top:70%; left:74%; animation-delay:2s"></div>
      <div class="firefly" style="top:56%; left:48%; animation-delay:4s"></div>`;
  }
  return `<div class="sun"></div><div class="wave"></div>
    <div class="wave" style="top:49%; opacity:.5; animation-delay:-2.5s"></div>`;
}

function isNight() { const h = new Date().getHours(); return h >= 20 || h < 6; }

function renderStage() {
  stage.className = 'env-' + S.env + (isNight() ? ' night' : '');
  $('#scenery').innerHTML = scenery(S.env);
}

function renderPets() {
  let html = '';
  S.pets.forEach((p, i) => {
    html += `<div class="petCard ${i === S.active ? 'active' : ''} ${p.asleep ? 'asleep' : ''}" data-i="${i}">
      ${creatureSVG(p)}<span class="petName">${SPECIES[p.sp].name}</span></div>`;
  });
  if (S.egg) html += `<div class="eggCard" id="eggCard">${eggSVG}<span class="petName">??? egg</span></div>`;
  petsEl.innerHTML = html;
}

function renderHUD() {
  $('#giggles').textContent = Math.floor(S.giggles);
  $('#btnEgg').hidden = !(S.pets.length < MAX_PETS && !S.egg && S.pets.length > 0);
  const p = S.pets[S.active];
  $('#statPanel').hidden = !p;
  if (p) {
    const set = (cls, v) => {
      const el = $('#statPanel .' + cls);
      el.querySelector('.v').textContent = Math.round(v);
      el.querySelector('.fill').style.width = v + '%';
    };
    set('s-food', p.food); set('s-happy', p.happy); set('s-energy', p.energy);
    $('#btnSleep').textContent = p.asleep ? '☀️ Wake' : '🌙 Sleep';
  }
}

let lastSig = '';
function renderAll(force) {
  const sig = JSON.stringify([S.env, S.egg && S.egg.taps, S.active,
    S.pets.map(p => [p.sp, p.asleep, creatureMoodSig(p)])]);
  if (force || sig !== lastSig) { renderPets(); lastSig = sig; }
  renderHUD();
}
function creatureMoodSig(p) {
  return p.asleep ? 'z' : (Math.min(p.food, p.happy, p.energy) < 35 ? 'sad' : (p.happy > 70 ? 'happy' : 'ok'));
}

/* ====================== feedback ====================== */

let toastT;
function toast(msg) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove('show'), 2600);
}
let bubbleT;
function speak(msg) {
  const b = $('#bubble'); b.textContent = msg; b.classList.add('show');
  clearTimeout(bubbleT); bubbleT = setTimeout(() => b.classList.remove('show'), 4200);
}
function particle(emoji, x, y) {
  const s = document.createElement('span');
  s.className = 'float'; s.textContent = emoji;
  s.style.left = x + 'px'; s.style.top = y + 'px';
  fx.appendChild(s); setTimeout(() => s.remove(), 1300);
}
function burst(cx, cy) {
  ['🎉','✨','🎊','💖','⭐','✨','🎉','💫'].forEach((e, i) =>
    setTimeout(() => particle(e, cx - 60 + Math.random() * 120, cy - 40 + Math.random() * 80), i * 70));
}

/* ====================== interactions ====================== */

// select pet / tap egg
petsEl.addEventListener('click', e => {
  const egg = e.target.closest('#eggCard');
  if (egg) return tapEgg(egg);
  const card = e.target.closest('.petCard');
  if (card && +card.dataset.i !== S.active) { S.active = +card.dataset.i; renderAll(); save(); }
});

function tapEgg(el) {
  S.egg.taps++;
  buzz(20);
  el.classList.remove('wob'); void el.offsetWidth; el.classList.add('wob');
  if (S.egg.taps >= EGG_TAPS) {
    const owned = S.pets.map(p => p.sp);
    const sp = rnd(Object.keys(SPECIES).filter(k => !owned.includes(k)));
    S.pets.push({ sp, food: 85, happy: 85, energy: 85, asleep: false, born: Date.now() });
    S.active = S.pets.length - 1;
    S.egg = null;
    const r = stage.getBoundingClientRect();
    burst(r.width / 2, r.height * .6);
    toast(`🎉 ${SPECIES[sp].name} the ${SPECIES[sp].flavor} hatched!`);
    buzz([40, 60, 40]);
  }
  renderAll(); save();
}

// petting (stroke the active pet)
let petting = false, lastX = 0, lastY = 0, strokeAcc = 0;
petsEl.addEventListener('pointerdown', e => {
  if (!e.target.closest('.petCard.active')) return;
  petting = true; lastX = e.clientX; lastY = e.clientY; strokeAcc = 0;
});
addEventListener('pointerup', () => petting = false);
addEventListener('pointercancel', () => petting = false);
petsEl.addEventListener('pointermove', e => {
  if (!petting) return;
  const p = S.pets[S.active];
  if (!p || p.asleep) return;
  strokeAcc += Math.hypot(e.clientX - lastX, e.clientY - lastY);
  lastX = e.clientX; lastY = e.clientY;
  if (strokeAcc > 110) {
    strokeAcc = 0;
    p.happy = clamp(p.happy + 2);
    const r = stage.getBoundingClientRect();
    particle('💗', e.clientX - r.left, e.clientY - r.top);
    buzz(12);
    renderHUD();
  }
});

$('#btnFeed').addEventListener('click', () => {
  const p = S.pets[S.active];
  if (!p) return toast('Hatch your egg first! 🥚');
  if (p.asleep) return speak(`${SPECIES[p.sp].name} is asleep… shhh 🤫`);
  if (p.food > 95) { speak(`${SPECIES[p.sp].name} is completely full!!`); return; }
  p.food = clamp(p.food + 30); p.happy = clamp(p.happy + 3);
  const r = stage.getBoundingClientRect();
  particle('🍪', r.width / 2, r.height * .55);
  buzz(15); renderAll(); save();
});

$('#btnSleep').addEventListener('click', () => {
  const p = S.pets[S.active];
  if (!p) return toast('Hatch your egg first! 🥚');
  p.asleep = !p.asleep;
  speak(p.asleep ? `${SPECIES[p.sp].name} curls up to sleep… 💤 (dream bubbles incoming!)`
                 : `${SPECIES[p.sp].name} is awake!`);
  renderAll(); save();
});

$('#btnEgg').addEventListener('click', () => {
  if (S.giggles < EGG_COST) return toast(`Need ${EGG_COST} ✨ — catch more giggles!`);
  S.giggles -= EGG_COST; S.egg = { taps: 0 };
  toast('A mysterious egg appeared! Tap it! 🥚');
  renderAll(); save();
});

/* ---------- environment modal ---------- */
$('#btnEnv').addEventListener('click', () => { renderEnvList(); $('#modal').classList.add('open'); });
$('#modal').addEventListener('click', e => { if (e.target === $('#modal')) $('#modal').classList.remove('open'); });

function renderEnvList() {
  $('#envList').innerHTML = Object.entries(ENVS).map(([k, v]) => {
    const owned = S.unlocked.includes(k), sel = S.env === k;
    const st = sel ? 'current home' : owned ? 'tap to move in' : `unlock for ${v.cost} ✨`;
    return `<button class="envCard ${sel ? 'sel' : ''}" data-k="${k}">
      <span class="preview pv-${k}"></span>
      <span><div class="nm">${v.emoji} ${v.name}</div><div class="st">${st}</div></span></button>`;
  }).join('');
}
$('#envList').addEventListener('click', e => {
  const card = e.target.closest('.envCard'); if (!card) return;
  const k = card.dataset.k;
  if (!S.unlocked.includes(k)) {
    if (S.giggles < ENVS[k].cost) return toast(`Need ${ENVS[k].cost} ✨ for ${ENVS[k].name}!`);
    S.giggles -= ENVS[k].cost; S.unlocked.push(k);
    toast(`🏡 ${ENVS[k].name} unlocked!`);
  }
  S.env = k;
  $('#modal').classList.remove('open');
  renderStage(); renderAll(); save();
});

/* ---------- pickups: giggle sparkles & dream bubbles ---------- */
function spawnPickup(emoji, reward, msg) {
  if (stage.querySelectorAll('.pickup').length >= 3) return;
  const b = document.createElement('button');
  b.className = 'pickup'; b.textContent = emoji;
  b.style.left = (10 + Math.random() * 78) + '%';
  b.style.top = (14 + Math.random() * 40) + '%';
  b.addEventListener('click', () => {
    S.giggles += reward;
    const r = stage.getBoundingClientRect(), br = b.getBoundingClientRect();
    particle('+' + reward + '✨', br.left - r.left, br.top - r.top);
    b.remove(); buzz(15); renderHUD(); save();
    if (msg) speak(msg);
  }, { once: true });
  stage.appendChild(b);
  setTimeout(() => b.remove(), 8000);
}

/* ====================== game loop ====================== */

let dramaTimer = 0;
setInterval(() => {
  S.pets.forEach(p => tickPet(p, 1));

  // giggle sparkles from happy awake pets
  if (S.pets.some(p => !p.asleep && p.happy > 65) && Math.random() < 0.09)
    spawnPickup('✨', 2);
  // dream bubbles from sleeping pets
  if (S.pets.some(p => p.asleep) && Math.random() < 0.05)
    spawnPickup('💭', 3);
  // cuddle moments
  const happyPets = S.pets.filter(p => !p.asleep && p.happy > 60);
  if (happyPets.length >= 2 && Math.random() < 0.008) {
    const [a, b] = happyPets;
    speak(rnd(CUDDLES).replace('{a}', SPECIES[a.sp].name).replace('{b}', SPECIES[b.sp].name));
    const r = stage.getBoundingClientRect();
    particle('💞', r.width / 2, r.height * .5);
  }

  // drama & idle chatter
  if (++dramaTimer >= 18) {
    dramaTimer = 0;
    const p = S.pets[S.active];
    if (p && !p.asleep) {
      const L = SPECIES[p.sp].lines;
      if (p.food < 40) speak(rnd(L.hungry));
      else if (p.energy < 30) speak(rnd(L.tired));
      else if (p.happy < 40) speak(rnd(L.sad));
      else if (p.happy > 75 && Math.random() < .5) speak(rnd(L.idle));
    }
  }

  renderAll();
  if (dramaTimer % 10 === 0) save();
}, 1000);

/* ====================== boot ====================== */

renderStage(); renderAll(true);
setInterval(renderStage, 60000); // track day/night

if (!S.greeted) {
  S.greeted = true; save();
  setTimeout(() => toast('A mysterious egg appeared! Tap it! 🥚'), 600);
}

if ('serviceWorker' in navigator && location.protocol === 'https:')
  navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
</html>
